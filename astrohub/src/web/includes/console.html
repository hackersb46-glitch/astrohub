.toggle-switch {
    position: relative;
    display: inline-block;
    width: 40px;
    height: 22px;
}
.toggle-switch input {
    opacity: 0;
    width: 0;
    height: 0;
}
.toggle-slider {
    position: absolute;
    cursor: pointer;
    top: 0;
    left: 0;
    right: 0;
    bottom: 0;
    background-color: #30363d;
    transition: 0.3s;
    border-radius: 22px;
}
.toggle-slider:before {
    position: absolute;
    content: "";
    height: 16px;
    width: 16px;
    left: 3px;
    bottom: 3px;
    background-color: #e0e6f0;
    transition: 0.3s;
    border-radius: 50%;
}
input:checked + .toggle-slider {
    background-color: #238636;
}
input:checked + .toggle-slider:before {
    transform: translateX(18px);
}

// v6.20 + v7.0: 禁用所有控制区域（PTZ + 媒体 + 跟踪 + 画面）
function disableImageControls(reason) {
    // v7.11: 禁用画面控制控件（包括增益）
    var controls = [
        'consoleBrightness', 'consoleContrast', 'consoleSaturation', 'consoleSharpness',
        'wbMode', 'wbRed', 'wbBlue', 'dnrSpatial', 'dnrTemporal',
        'exposureMode', 'shutterSpeed', 'irisLevel', 'gainLevel',  // v7.11: 添加 gainLevel
        'infoOsdSwitch', 'ptzOsdSwitch'
    ];
    controls.forEach(function(id) {
        var el = document.getElementById(id);
        if (el) {
            el.disabled = true;
            el.style.opacity = '0.5';
            el.style.cursor = 'not-allowed';
        }
    });
    
    // v7.0: 禁用 PTZ 控制按钮
    var ptzSection = document.getElementById('ptzControlSection');
    if (ptzSection) {
        var ptzBtns = ptzSection.querySelectorAll('.btn, .ptz-btn');
        ptzBtns.forEach(function(btn) {
            if (btn.id !== 'ptzSpeed') {
                btn.disabled = true;
                btn.style.opacity = '0.5';
                btn.style.cursor = 'not-allowed';
            }
        });
    }
    
    // v7.0: 禁用媒体操作按钮
    var mediaButtons = ['btnConsoleSnapshot', 'btnConsoleRecordStart', 'btnConsoleRecordStop', 'btnLiveStackStart', 'btnLiveStackStop', 'btnLiveStackSave'];
    mediaButtons.forEach(function(id) {
        var el = document.getElementById(id);
        if (el) {
            el.disabled = true;
            el.style.opacity = '0.5';
            el.style.cursor = 'not-allowed';
        }
    });
    
    // v7.0: 禁用跟踪控制按钮
    var trackButtons = ['btnTrackSidereal', 'btnTrackLunar', 'btnTrackSolar', 'btnTrackOff'];
    trackButtons.forEach(function(id) {
        var el = document.getElementById(id);
        if (el) {
            el.disabled = true;
            el.style.opacity = '0.5';
            el.style.cursor = 'not-allowed';
        }
    });
    
    // v7.01: 显示主控台提示框，移除画面控制区的提示
    var consoleWarning = document.getElementById('consoleWarning');
    if (consoleWarning) {
        consoleWarning.style.display = 'block';
    }
    
    // 移除画面控制区的旧提示（如果存在）
    var oldWarning = document.getElementById('functionCacheWarning');
    if (oldWarning) oldWarning.remove();
    
    // v7.0: 停止 PTZ 坐标刷新
    if (window.stopPtzImagePoll) window.stopPtzImagePoll();
}

        var ptzBtns = ptzSection.querySelectorAll('.btn, .ptz-btn');

                btn.disabled = false;

                btn.style.cursor = 'pointer';
            }
        });
    }
    
    // v7.0: 启用媒体操作按钮

    mediaButtons.forEach(function(id) {
        var el = document.getElementById(id);

            el.style.opacity = '1';

        }

    var trackButtons = ['btnTrackSidereal', 'btnTrackLunar', 'btnTrackSolar', 'btnTrackOff'];
    trackButtons.forEach(function(id) {
        var el = document.getElementById(id);
        if (el) {
            el.disabled = false;
            el.style.opacity = '1';

// 连接设备时加载图像参数（从function.json读取范围，从ISAPI读取当前值）
// v6.20: 优先读取缓存，无缓存时禁用控件
// v6.41: 修复下拉菜单加载中问题
// 当 function.json 不存在时，仍然加载基础参数（使用默认范围）
// v6.43: 刷新画面控制按钮
function refreshImageControls() {
    if (!window.connectedDevice || !window.connectedDevice.ip) {
        console.warn('[IMAGE] No device connected');
        return;
    }
    console.log('[IMAGE] Refreshing image controls...');
    loadDeviceImageParams(window.connectedDevice.ip);
}

// v6.50: 重置画面控制到系统默认值
function resetImageControls() {
    if (!window.connectedDevice || !window.connectedDevice.ip) {
        console.warn('[IMAGE] No device connected');
        return;
    }
    
    // 弹出确认对话框
    if (!confirm('确认重置画面控制到系统默认值？')) {
        return;
    }
    
    var dev = window.connectedDevice.ip;
    console.log('[IMAGE] Resetting image controls to defaults...');
    
    // 系统默认值
    var defaults = {
        brightness: 50,
        contrast: 50,
        saturation: 50,
        sharpness: 50,
        wbRed: 100,
        wbBlue: 100,
        dnrSpatial: 50,
        dnrTemporal: 50,
        exposureMode: 'auto',
        shutterSpeed: '1/100',
        irisLevel: 1600
    };
    
    // 更新 UI
    document.getElementById('consoleBrightness').value = defaults.brightness;
    document.getElementById('brightnessVal').textContent = defaults.brightness;
    document.getElementById('consoleContrast').value = defaults.contrast;
    document.getElementById('contrastVal').textContent = defaults.contrast;
    document.getElementById('consoleSaturation').value = defaults.saturation;
    document.getElementById('saturationVal').textContent = defaults.saturation;
    document.getElementById('consoleSharpness').value = defaults.sharpness;
    document.getElementById('sharpnessVal').textContent = defaults.sharpness;
    document.getElementById('wbRed').value = defaults.wbRed;
    document.getElementById('wbRedVal').textContent = defaults.wbRed;
    document.getElementById('wbBlue').value = defaults.wbBlue;
    document.getElementById('wbBlueVal').textContent = defaults.wbBlue;
    document.getElementById('dnrSpatial').value = defaults.dnrSpatial;
    document.getElementById('dnrSpatialVal').textContent = defaults.dnrSpatial;
    document.getElementById('dnrTemporal').value = defaults.dnrTemporal;
    document.getElementById('dnrTemporalVal').textContent = defaults.dnrTemporal;
    document.getElementById('exposureMode').value = defaults.exposureMode;
    document.getElementById('shutterSpeed').value = defaults.shutterSpeed;
    document.getElementById('irisLevel').value = defaults.irisLevel;
    
    // 发送 API 请求重置设备
    apiPost('/api/v1/ptz/' + dev + '/image/reset', {})
        .then(function(r) {
            if (r && r.success) {
                showToast('success', '画面控制已重置到系统默认值');
            } else {
                showToast('error', '重置失败: ' + (r.message || '未知错误'));
            }
        })
        .catch(function(e) {
            showToast('error', '重置请求失败');
        });
}

function loadDeviceImageParams(deviceIp) {
    if (!deviceIp) return;
    
    if (typeof apiGet === 'undefined') {
        console.error('[IMAGE] apiGet not defined');
        return;
    }
    
    console.log('[IMAGE] Loading image params for:', deviceIp);
    
    // v6.41: 重置状态，但允许无缓存时加载
    functionCacheLoaded = false;
    deviceFunctionData = null;
    
    // v6.41: 尝试加载 function.json 缓存，失败也继续加载其他参数
    apiGet('/api/v1/ptz/' + deviceIp + '/function').then(function(r) {
        if (r && r.success && r.data && r.data.function_detection) {
            deviceFunctionData = r.data;
            functionCacheLoaded = true;
            console.log('[IMAGE] function.json loaded from cache');
            enableImageControls();
        } else {
            console.warn('[IMAGE] function.json not found');
            // v6.48: 无功能测试记录，禁用控件并显示提示
            disableImageControls('无功能测试记录，请运行功能测试');
        }
    }).catch(function(e) {
        console.warn('[IMAGE] function.json failed:', e);
        // v6.48: 无功能测试记录，禁用控件并显示提示
        disableImageControls('无功能测试记录，请运行功能测试');
    });
    
    // v6.41: 无论如何都加载参数（使用 ISAPI 直接读取）
    loadExposure(deviceIp);
    loadOsdStatus(deviceIp);
    loadWhiteBalance(deviceIp);
    loadNoiseReduce(deviceIp);
    loadShutter(deviceIp);
    loadIris(deviceIp);
    loadSharpness(deviceIp);
    loadColorParams(deviceIp);
    loadGain(deviceIp);  // v7.03: 加载增益
}

// 加载 OSD 状态
function loadOsdStatus(deviceIp) {
    // PTZ OSD
    apiGet('/api/v1/ptz/' + deviceIp + '/osd/ptz').then(function(r) {
        if (r && r.success) {
            var enabled = r.enabled || r.data?.enabled || false;
            updatePtzOsdButtons(enabled);
            // 保存到 localStorage
            localStorage.setItem('osd_ptz_' + deviceIp, enabled ? '1' : '0');
        } else {
            // 从 localStorage 读取上次设置
            var saved = localStorage.getItem('osd_ptz_' + deviceIp);
            if (saved !== null) {
                updatePtzOsdButtons(saved === '1');
            }
        }
    }).catch(function(e) {
        var saved = localStorage.getItem('osd_ptz_' + deviceIp);
        if (saved !== null) {
            updatePtzOsdButtons(saved === '1');
        }
    });
    
    // Info OSD
    apiGet('/api/v1/ptz/' + deviceIp + '/osd/info').then(function(r) {
        if (r && r.success) {
            var enabled = r.enabled || r.data?.enabled || false;
            updateInfoOsdButtons(enabled);
            localStorage.setItem('osd_info_' + deviceIp, enabled ? '1' : '0');
        } else {
            var saved = localStorage.getItem('osd_info_' + deviceIp);
            if (saved !== null) {
                updateInfoOsdButtons(saved === '1');
            }
        }
    }).catch(function(e) {
        var saved = localStorage.getItem('osd_info_' + deviceIp);
        if (saved !== null) {
            updateInfoOsdButtons(saved === '1');
        }
    });
}

function updatePtzOsdButtons(enabled) {
    var btnOn = document.getElementById('btnPtzOsdOn');
    var btnOff = document.getElementById('btnPtzOsdOff');
    if (btnOn && btnOff) {
        if (enabled) {
            btnOn.className = 'btn btn-sm btn-primary';
            btnOff.className = 'btn btn-sm btn-secondary';
        } else {
            btnOn.className = 'btn btn-sm btn-secondary';
            btnOff.className = 'btn btn-sm btn-primary';
        }
    }
    // v6.14: 同步开关状态
    var sw = document.getElementById('ptzOsdSwitch');
    if (sw) sw.checked = enabled;
}

function updateInfoOsdButtons(enabled) {
    var btnOn = document.getElementById('btnInfoOsdOn');
    var btnOff = document.getElementById('btnInfoOsdOff');
    if (btnOn && btnOff) {
        if (enabled) {
            btnOn.className = 'btn btn-sm btn-primary';
            btnOff.className = 'btn btn-sm btn-secondary';
        } else {
            btnOn.className = 'btn btn-sm btn-secondary';
            btnOff.className = 'btn btn-sm btn-primary';
        }
    }
    // v6.14: 同步开关状态
    var sw = document.getElementById('infoOsdSwitch');
    if (sw) sw.checked = enabled;
}

// 加载白平衡
function loadWhiteBalance(deviceIp) {
    apiGet('/api/v1/ptz/' + deviceIp + '/image/whitebalance').then(function(r) {
        if (r && r.success && r.data) {
            var wb = r.data;
            deviceImageParams.whiteBalance = wb;
            
            // 更新模式下拉 - v5.40: 自动(官方)/自动(Astrohub)/手动
            var wbModeSelect = document.getElementById('wbMode');
            if (wbModeSelect) {
                wbModeSelect.innerHTML = '';
                
                // 选项1: 自动（官方）
                var opt1 = document.createElement('option');
                opt1.value = 'auto_official';
                opt1.textContent = '自动（官方）';
                if (wb.mode === 'auto') opt1.selected = true;
                wbModeSelect.appendChild(opt1);
                
                // 选项2: 自动
                var opt2 = document.createElement('option');
                opt2.value = 'auto_astrohub';
                opt2.textContent = '自动';
                wbModeSelect.appendChild(opt2);
                
                // 选项3: 手动
                var opt3 = document.createElement('option');
                opt3.value = 'manual';
                opt3.textContent = '手动';
                if (wb.mode === 'manual') opt3.selected = true;
                wbModeSelect.appendChild(opt3);
            }
            
            // 更新 R/B 滑动条
            var wbRed = document.getElementById('wbRed');
            var wbBlue = document.getElementById('wbBlue');
            var wbRedVal = document.getElementById('wbRedVal');
            var wbBlueVal = document.getElementById('wbBlueVal');
            
            if (wbRed && wb.red_gain !== undefined) {
                wbRed.value = wb.red_gain;
                if (wbRedVal) wbRedVal.textContent = wb.red_gain;
            }
            if (wbBlue && wb.blue_gain !== undefined) {
                wbBlue.value = wb.blue_gain;
                if (wbBlueVal) wbBlueVal.textContent = wb.blue_gain;
            }
            
            // 设置范围
            if (wb.min !== undefined && wb.max !== undefined) {
                if (wbRed) { wbRed.min = wb.min; wbRed.max = wb.max; }
                if (wbBlue) { wbBlue.min = wb.min; wbBlue.max = wb.max; }
            }
            
            // v5.40: 只有手动模式时 R/B 滑动条才可用
            var isManual = wb.mode === 'manual';
            if (wbRed) wbRed.disabled = !isManual;
            if (wbBlue) wbBlue.disabled = !isManual;
        }
    }).catch(function(e) {
        console.warn('[WB] Load failed:', e);
    });
}

// 加载快门
function loadShutter(deviceIp) {
    apiGet('/api/v1/ptz/' + deviceIp + '/image/shutter').then(function(r) {
        if (r && r.success && r.data) {
            var sh = r.data;
            deviceImageParams.shutter = sh;
            
            var shutterSelect = document.getElementById('shutterSpeed');
            if (shutterSelect) {
                shutterSelect.innerHTML = '';
                
                // v7.08: 从 function.json 获取 opt_values
                var shutterValues = null;
                if (deviceFunctionData && deviceFunctionData.functions && deviceFunctionData.functions.shutter) {
                    shutterValues = deviceFunctionData.functions.shutter.opt_values;
                }
                
                if (shutterValues && Array.isArray(shutterValues)) {
                    // 使用设备返回的 opt_values
                    shutterValues.forEach(function(p) {
                        var opt = document.createElement('option');
                        opt.value = p;
                        opt.textContent = p;
                        if (p === sh.current_level) opt.selected = true;
                        shutterSelect.appendChild(opt);
                    });
                } else {
                    // 回退到默认值
                    var shutterPresets = ['1/25', '1/30', '1/60', '1/125', '1/250', '1/500', '1/1000', '1/2000', '1/4000', '1/8000'];
                    shutterPresets.forEach(function(p) {
                        var opt = document.createElement('option');
                        opt.value = p;
                        opt.textContent = p;
                        if (p === sh.current_level) opt.selected = true;
                        shutterSelect.appendChild(opt);
                    });
                }
            }
        }
    }).catch(function(e) {
        console.warn('[Shutter] Load failed:', e);
        // 设置默认选项
        var shutterSelect = document.getElementById('shutterSpeed');
        if (shutterSelect) {
            shutterSelect.innerHTML = '';
            var presets = ['1/25', '1/30', '1/60', '1/125', '1/250', '1/500', '1/1000'];
            presets.forEach(function(p) {
                shutterSelect.innerHTML += '<option value="' + p + '">' + p + '</option>';
            });
        }
    });
}

// 加载光圈
function loadIris(deviceIp) {
    apiGet('/api/v1/ptz/' + deviceIp + '/image/iris').then(function(r) {
        if (r && r.success && r.data) {
            var ir = r.data;
            deviceImageParams.iris = ir;
            
            var irisSelect = document.getElementById('irisLevel');
            if (irisSelect) {
                irisSelect.innerHTML = '';
                
                var current = ir.current_level || 160;
                
                // v7.08: 从 function.json 获取 opt_values
                var irisValues = null;
                if (deviceFunctionData && deviceFunctionData.functions && deviceFunctionData.functions.iris) {
                    irisValues = deviceFunctionData.functions.iris.opt_values;
                }
                
                if (irisValues && Array.isArray(irisValues)) {
                    // 使用设备返回的 opt_values
                    irisValues.forEach(function(val) {
                        var numVal = parseInt(val);
                        var opt = document.createElement('option');
                        opt.value = numVal;
                        // 计算 F 值
                        var fNum = numVal / 100;
                        opt.textContent = 'F' + fNum.toFixed(1);
                        if (numVal === current) opt.selected = true;
                        irisSelect.appendChild(opt);
                    });
                } else {
                    // 回退到默认 F 值映射
                    var fValues = [
                        {val: 160, label: 'F1.6'},
                        {val: 200, label: 'F2.0'},
                        {val: 280, label: 'F2.8'},
                        {val: 400, label: 'F4.0'},
                        {val: 560, label: 'F5.6'},
                        {val: 800, label: 'F8.0'},
                        {val: 1100, label: 'F11'},
                        {val: 1600, label: 'F16'},
                        {val: 2200, label: 'F22'}
                    ];
                    
                    fValues.forEach(function(f) {
                        var opt = document.createElement('option');
                        opt.value = f.val;
                        opt.textContent = f.label;
                        if (f.val === current) opt.selected = true;
                        irisSelect.appendChild(opt);
                    });
                }
            }
        }
    }).catch(function(e) {
        console.warn('[Iris] Load failed:', e);
        // 设置默认选项
        var irisSelect = document.getElementById('irisLevel');
        if (irisSelect) {
            irisSelect.innerHTML = '<option value="">-- 选择 --</option>';
            var fValues = ['F1.6', 'F2.0', 'F2.8', 'F4.0', 'F5.6', 'F8.0', 'F11', 'F16', 'F22'];
            fValues.forEach(function(f) {
                irisSelect.innerHTML += '<option value="' + f + '">' + f + '</option>';
            });
        }
    });
}

// ==================== 设置函数 ====================

// 设置锐度
function setSharpness(value) {
    var dev = window.connectedDevice ? window.connectedDevice.ip : null;
    if (!dev) return;
    apiPost('/api/v1/ptz/' + dev + '/image/sharpness', { level: parseInt(value) });
}

// 设置白平衡模式
function setWhiteBalanceMode(mode) {
    var dev = window.connectedDevice ? window.connectedDevice.ip : null;
    if (!dev) return;
    
    // v5.40: 处理三种模式
    var actualMode = mode;
    if (mode === 'auto_official') {
        actualMode = 'auto';
    } else if (mode === 'auto_astrohub') {
        // 暂未实现
        showToast('warning', '自动暂未实现');
        return;
    }
    
    apiPost('/api/v1/ptz/' + dev + '/image/whitebalance', { mode: actualMode })
        .then(function(r) {
            if (r && r.success) {
                showToast('success', '白平衡: ' + (actualMode === 'auto' ? '自动（官方）' : '手动'));
                // v5.40: 更新 R/B 滑动条状态
                var wbRed = document.getElementById('wbRed');
                var wbBlue = document.getElementById('wbBlue');
                if (wbRed) wbRed.disabled = actualMode !== 'manual';
                if (wbBlue) wbBlue.disabled = actualMode !== 'manual';
            }
        });
}

// 设置白平衡增益 R/B
function setWhiteBalanceGain(channel, value) {
    var dev = window.connectedDevice ? window.connectedDevice.ip : null;
    if (!dev) return;
    
    // 更新显示
    if (channel === 'red') {
        var el = document.getElementById('wbRedVal');
        if (el) el.textContent = value;
    } else {
        var el = document.getElementById('wbBlueVal');
        if (el) el.textContent = value;
    }
    
    var key = channel === 'red' ? 'red_gain' : 'blue_gain';
    var label = channel === 'red' ? 'R (红增益)' : 'B (蓝增益)';
    
    // v6.56: 只发送增益值，不发送模式（模式已通过下拉菜单切换）
    apiPost('/api/v1/ptz/' + dev + '/image/whitebalance', { [key]: parseInt(value) })
        .then(function(r) {
            if (r && r.success) {
                showToast('success', label + ': ' + value);
            }
        });
}

// 设置降噪
function setNoiseReduce(type, value) {
    var dev = window.connectedDevice ? window.connectedDevice.ip : null;
    if (!dev) return;
    
    var el = document.getElementById(type === 'spatial' ? 'dnrSpatialVal' : 'dnrTemporalVal');
    if (el) el.textContent = value;
    
    var key = type === 'spatial' ? 'spatial_level' : 'temporal_level';
    var label = type === 'spatial' ? '空域降噪' : '时域降噪';
    
    apiPost('/api/v1/ptz/' + dev + '/image/noisereduce', { [key]: parseInt(value) })
        .then(function(r) {
            if (r && r.success) {
                showToast('success', label + ': ' + value);
            }
        });
}

// 加载曝光模式
function loadExposure(deviceIp) {
    apiGet('/api/v1/ptz/' + deviceIp + '/image/exposure').then(function(r) {
        if (r && r.success && r.data) {
            var select = document.getElementById('exposureMode');
            if (select && r.data.mode) {
                // v5.47: 只支持 auto/manual，其他模式统一为 manual
                select.value = (r.data.mode === 'auto') ? 'auto' : 'manual';
                // 更新快门光圈禁用状态
                updateShutterIrisState();
            }
        }
    }).catch(function(e) {
        console.warn('[Exposure] Load failed:', e);
    });
}

// 设置曝光模式
function setExposureMode(mode) {
    var dev = window.connectedDevice ? window.connectedDevice.ip : null;
    if (!dev) return;
    apiPost('/api/v1/ptz/' + dev + '/image/exposure', { mode: mode })
        .then(function(r) {
            if (r && r.success) showToast('success', '曝光模式: ' + (mode === 'manual' ? '手动' : '自动'));
        });
    // v5.47: 自动模式下禁用快门光圈
    updateShutterIrisState();
}

// v5.47: 更新快门光圈禁用状态
function updateShutterIrisState() {
    // v7.30: 检查设备是否连接
    if (!window.connectedDevice || !window.connectedDevice.ip) {
        // 设备未连接，所有控件保持禁用
        return;
    }
    
    var exposureMode = document.getElementById('exposureMode');
    var shutterSelect = document.getElementById('shutterSpeed');
    var irisSelect = document.getElementById('irisLevel');
    var gainSlider = document.getElementById('gainLevel');
    if (!exposureMode || !shutterSelect || !irisSelect) return;
    
    var isManual = exposureMode.value === 'manual';
    shutterSelect.disabled = !isManual;
    irisSelect.disabled = !isManual;
    if (gainSlider) gainSlider.disabled = !isManual;
    
    // 禁用时灰色样式
    if (!isManual) {
        shutterSelect.style.opacity = '0.5';
        irisSelect.style.opacity = '0.5';
        if (gainSlider) gainSlider.style.opacity = '0.5';
    } else {
        shutterSelect.style.opacity = '1';
        irisSelect.style.opacity = '1';
        if (gainSlider) gainSlider.style.opacity = '1';
    }
}

// 设置快门
function setShutterSpeed(value) {
    var dev = window.connectedDevice ? window.connectedDevice.ip : null;
    if (!dev) return;
    apiPost('/api/v1/ptz/' + dev + '/image/shutter', { level: value })

}

// 设置光圈
function setIris(value) {
    var dev = window.connectedDevice ? window.connectedDevice.ip : null;

    apiPost('/api/v1/ptz/' + dev + '/image/iris', { level: parseInt(value) })

            if (r && r.success) {

// v7.03: 设置增益
function setGain(value) {
    var dev = window.connectedDevice ? window.connectedDevice.ip : null;
    if (!dev) return;
    apiPost('/api/v1/ptz/' + dev + '/image/gain', { level: parseInt(value) })
        .then(function(r) {
            if (r && r.success) showToast('success', '增益: ' + value);
        });
}

// v7.03: 加载增益
function loadGain(deviceIp) {
    apiGet('/api/v1/ptz/' + deviceIp + '/image/gain').then(function(r) {
        if (r && r.success && r.data) {
            var g = r.data;
            deviceImageParams.gain = g;
            
            var slider = document.getElementById('gainLevel');
            var valEl = document.getElementById('gainVal');
            
            if (slider) {
                slider.min = 0;
                slider.max = g.limit || 100;
                slider.value = g.current_level || 0;
            }
            if (valEl) valEl.textContent = g.current_level || 0;
        }
    }).catch(function(e) {
        console.warn('[Gain] Load failed:', e);
    });
}

// v6.02: PTZ OSD 开关

function togglePtzOsd(enabled) {

// ==================== v7.0: PTZ 坐标 + 图像参数实时刷新 ====================
var _ptzImagePollInterval = null;

function startPtzImagePoll() {
    if (_ptzImagePollInterval) return; // 已在运行
    
    _ptzImagePollInterval = setInterval(function() {
        if (!window.connectedDevice || !window.connectedDevice.ip) return;
        
        var dev = window.connectedDevice.ip;
        
        // 1. PTZ 坐标
        apiGet('/api/v1/ptz/' + dev + '/position').then(function(r) {
            if (r && r.success && r.data) {
                var posEl = document.getElementById('ptzPosition');
                if (posEl) {
                    posEl.innerHTML = 'Pan: ' + (r.data.pan || 0) + ' | Tilt: ' + (r.data.tilt || 0) + ' | Zoom: ' + (r.data.zoom || 0);
                }
            }
        }).catch(function(e) {});
        
        // 2. 白平衡 R/B
        apiGet('/api/v1/ptz/' + dev + '/image/whitebalance').then(function(r) {
            if (r && r.success && r.data) {
                var wb = r.data;
                var rEl = document.getElementById('ptzWbR');
                var bEl = document.getElementById('ptzWbB');
                if (rEl) rEl.textContent = 'R: ' + (wb.red_gain || '--');
                if (bEl) bEl.textContent = 'B: ' + (wb.blue_gain || '--');
            }
        }).catch(function(e) {});
        
        // 3. 降噪空域/时域 - v7.03: 显示实际数值（0 也显示 0）
        apiGet('/api/v1/ptz/' + dev + '/image/noisereduce').then(function(r) {
            if (r && r.success && r.data) {
                var nr = r.data;
                var sEl = document.getElementById('ptzDnrSpatial');
                var tEl = document.getElementById('ptzDnrTemporal');
                // v7.03: 显示实际数值
                var spatialVal = (nr.spatial_level !== undefined && nr.spatial_level !== null) ? nr.spatial_level : '--';
                var temporalVal = (nr.temporal_level !== undefined && nr.temporal_level !== null) ? nr.temporal_level : '--';
                if (sEl) sEl.textContent = '空域: ' + spatialVal;
                if (tEl) tEl.textContent = '时域: ' + temporalVal;
            }
        }).catch(function(e) {});
        
        // 4. 光圈
        apiGet('/api/v1/ptz/' + dev + '/image/iris').then(function(r) {
            if (r && r.success && r.data) {
                var ir = r.data;
                var iEl = document.getElementById('ptzIris');
                if (iEl) iEl.textContent = '光圈: ' + (ir.current_level || '--');
            }
        }).catch(function(e) {});
        
        // 5. 快门
        apiGet('/api/v1/ptz/' + dev + '/image/shutter').then(function(r) {
            if (r && r.success && r.data) {
                var sh = r.data;
                var sEl = document.getElementById('ptzShutter');
                if (sEl) sEl.textContent = '快门: ' + (sh.current_level || '--');
            }
        }).catch(function(e) {});
    }, 1000);
}

function stopPtzImagePoll() {
    if (_ptzImagePollInterval) {
        clearInterval(_ptzImagePollInterval);
        _ptzImagePollInterval = null;
    }
}

// 暴露到全局
window.startPtzImagePoll = startPtzImagePoll;
window.stopPtzImagePoll = stopPtzImagePoll;

window.togglePtzOsd = togglePtzOsd;
window.toggleInfoOsd = toggleInfoOsd;
window.updatePtzOsdButtons = updatePtzOsdButtons;
window.updateInfoOsdButtons = updateInfoOsdButtons;
