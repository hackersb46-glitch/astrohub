<script>
// v8.80: 垂直标签切换
function switchAdvTab(tabName) {
    // 切换标签 active 状态
    document.querySelectorAll('.adv-tab').forEach(function(tab) {
        tab.classList.toggle('active', tab.dataset.tab === tabName);
    });
    // 切换内容面板
    document.querySelectorAll('.tab-pane').forEach(function(pane) {
        pane.classList.toggle('active', pane.id === 'pane-' + tabName);
    });
    // 切换到时间标签时加载坐标
    if (tabName === 'geo') loadGeoLocation();
    // 切换到三星校准时初始化
    if (tabName === 'star3') initStarAlign();
    // 同步主控台的 OSD/PTZ 开关状态到高级功能
    if (tabName === 'function') {
        var mInfo = document.getElementById('infoOsdSwitch');
        var aInfo = document.getElementById('advInfoOsdSwitch');
        if (mInfo && aInfo) aInfo.checked = mInfo.checked;
        var mPtz = document.getElementById('ptzOsdSwitch');
        var aPtz = document.getElementById('advPtzOsdSwitch');
        if (mPtz && aPtz) aPtz.checked = mPtz.checked;
    }
}

// v8.78: 两段式开关
function setDualSwitch(switchId, val) {
    var sw = document.getElementById(switchId);
    if (!sw) return;
    sw.querySelectorAll('.ds-btn').forEach(function(btn) {
        btn.classList.toggle('active', btn.dataset.val === val);
    });
}

function getDualSwitchVal(switchId) {
    var sw = document.getElementById(switchId);
    if (!sw) return null;
    var active = sw.querySelector('.ds-btn.active');
    return active ? active.dataset.val : null;
}

// v8.78: 保存地理坐标
function saveGeoLocation() {
    var lat = document.getElementById('geoLatInput').value;
    var lon = document.getElementById('geoLonInput').value;
    if (!lat || !lon) { addAdvOutput('error', '请输入经纬度'); return; }
    var ns = getDualSwitchVal('latNsSwitch') || 'N';
    var ew = getDualSwitchVal('lonEwSwitch') || 'E';
    apiPost('/api/v1/geo', { lat: lat, lon: lon, ns: ns, ew: ew }).then(function(r) {
        if (r && r.success) {
            addAdvOutput('success', '坐标已保存: ' + r.data.lat + '°, ' + r.data.lon + '°');
        } else {
            addAdvOutput('error', r ? r.message : '保存失败');
        }
    }).catch(function(e) {
        addAdvOutput('error', '请求异常: ' + e.message);
    });
}

// v8.78: 加载地理坐标
function loadGeoLocation() {
    apiGet('/api/v1/geo').then(function(r) {
        if (r && r.success && r.data && r.data.lat_raw) {
            document.getElementById('geoLatInput').value = r.data.lat_raw;
            document.getElementById('geoLonInput').value = r.data.lon_raw;
            var ns = r.data.ns || 'N';
            var ew = r.data.ew || 'E';
            setDualSwitch('latNsSwitch', ns);
            setDualSwitch('lonEwSwitch', ew);
        }
    }).catch(function(e) {});
}

// v8.78: NTP时间同步
function syncNtp() {
    var btn = document.getElementById('btnNtpSync');
    var server = document.getElementById('ntpServerSelect').value;
    btn.disabled = true;
    btn.textContent = '同步中...';

    function addLine(text, color) {
        var output = document.getElementById('advOutput');
        var line = document.createElement('div');
        line.className = 'output-line ' + (color === '#3fb950' ? 'success' : color === '#f85149' ? 'error' : 'info');
        var time = new Date().toLocaleTimeString('en-US', {hour12: false});
        line.textContent = '[' + time + '] ' + text;
        output.appendChild(line);
        output.scrollTop = output.scrollHeight;
    }

    fetch('/api/v1/ntp/sync', {
        method: 'POST',
        headers: {'Content-Type': 'application/json'},
        body: JSON.stringify({ntp_server: server})
    }).then(function(response) {
        var reader = response.body.getReader();
        var decoder = new TextDecoder();
        var buffer = '';
        function read() {
            reader.read().then(function(result) {
                if (result.done) {
                    btn.disabled = false;
                    btn.textContent = '🔄 同步';
                    return;
                }
                buffer += decoder.decode(result.value, {stream: true});
                var lines = buffer.split('\n');
                buffer = lines.pop();
                lines.forEach(function(line) {
                    if (line.startsWith('data: ')) {
                        try {
                            var evt = JSON.parse(line.substring(6));
                            var color = '#8b949e';
                            if (evt.step === 'done') color = '#3fb950';
                            else if (evt.step === 'error') color = '#f85149';
                            addLine(evt.message, color);
                        } catch(e) {}
                    }
                });
                read();
            });
        }
        read();
    }).catch(function(e) {
        addLine('请求异常: ' + e.message, '#f85149');
        btn.disabled = false;
        btn.textContent = '🔄 同步';
    });
}

// 高级功能页面控制
let currentAdvTest = 'function';

function selectAdvTest(test) {
    currentAdvTest = test;
    document.querySelectorAll('.adv-menu-item').forEach(el => el.classList.remove('active'));
    document.querySelector(`[data-test="${test}"]`).classList.add('active');
    // v7.53: 删除"选择测试"输出,用户切换测试项目不需要额外提示
}

function addAdvOutput(type, text) {
    const output = document.getElementById('advOutput');
    const line = document.createElement('div');
    line.className = 'output-line ' + type;
    const time = new Date().toLocaleTimeString();
    line.textContent = '[' + time + '] ' + text;
    output.appendChild(line);
    output.scrollTop = output.scrollHeight;
}

function runAdvTest() {
    // 尝试从全局 connectedDevice 或下拉框获取设备
    var deviceIp = '';
    var username = 'admin';
    var password = '';

    if (window.connectedDevice && window.connectedDevice.ip) {
        deviceIp = window.connectedDevice.ip;
        username = window.connectedDevice.username || 'admin';
        password = window.connectedDevice.password || '';
    } else {
        // 从下拉框获取
        var deviceSelect = document.getElementById('advConnectDevice');
        if (deviceSelect && deviceSelect.value) {
            deviceIp = deviceSelect.value;
        } else {
            addAdvOutput('error', '请先连接设备');
            return;
        }
    }

    const btnRun = document.getElementById('btnAdvRun');
    const btnStop = document.getElementById('btnAdvStop');
    btnRun.disabled = true;
    btnStop.disabled = false;

    // v7.54: 禁用其他页面标签
    document.querySelectorAll('.nav-btn[data-page]').forEach(function(btn) {
        btn.disabled = true;
        btn.style.opacity = '0.5';
        btn.style.cursor = 'not-allowed';
    });

    // v7.52: 显示进度
    var progressEl = document.getElementById('advProgress');
    if (progressEl) progressEl.textContent = currentAdvTest + '...\u8fd0\u884c\u4e2d';

    addAdvOutput('info', '开始测试: ' + currentAdvTest);
    // v7.52: 显示设备名称而非IP
    var deviceName = window.connectedDevice.name || window.connectedDevice.device_name || deviceIp;
    addAdvOutput('info', '设备: ' + deviceName);

    // v7.120: 统一使用异步检测API
    var detectApiUrl = '/api/v1/advanced/detect/start';
    var detectItems = [currentAdvTest];

    // v7.52: 速度测试读取档位参数
    var requestBody = {
        device_ip: deviceIp,
        username: username,
        password: password
    };
    if (currentAdvTest === 'speed') {
        var speedRadio = document.querySelector('input[name="speedProfile"]:checked');
        if (speedRadio) {
            requestBody.speed_profile = speedRadio.value;
            addAdvOutput('info', '档位: ' + speedRadio.value);
        }
    }

    // v8.66: 暂停主控台轮询
    pausePtzPolling();

    fetch(detectApiUrl, {
        method: 'POST',
        headers: {'Content-Type': 'application/json'},
        body: JSON.stringify({
            device_ip: deviceIp,
            username: username,
            password: password,
            items: detectItems,
            speed_profile: requestBody.speed_profile || 'lite'
        })
    })
    .then(r => r.json())
    .then(data => {
        if (data.success && data.task_id) {
            addAdvOutput('info', '任务已启动: ' + data.task_id.substring(0,8));
            pollAdvProgress(data.task_id);
        } else {
            btnRun.disabled = false;
            btnStop.disabled = true;
            addAdvOutput('error', data.message || '启动失败');
            if (progressEl) progressEl.textContent = currentAdvTest + ' 失败';
        }
    })
    .catch(e => {
        btnRun.disabled = false;
        btnStop.disabled = true;
        addAdvOutput('error', '请求异常: ' + e.message);
    });
}

function stopAdvTest() {
    addAdvOutput('warn', '停止测试');
    // v7.112: 清除轮询 + 调后端取消
    if (advPollInterval) { clearInterval(advPollInterval); advPollInterval = null; }
    // v8.66: 恢复主控台轮询
    if (window.resumePtzPolling) resumePtzPolling();
    if (advTaskId) {
        fetch('/api/v1/advanced/detect/cancel/' + advTaskId, { method: 'POST' })
        .then(r => r.json())
        .then(d => { if (d.success) addAdvOutput('warn', '任务已取消: ' + advTaskId.substring(0,8)); })
        .catch(function () {});
        advTaskId = null;
    }
    var progressEl = document.getElementById('advProgress');
    if (progressEl) progressEl.textContent = '';
    document.getElementById('btnAdvRun').disabled = false;
    document.getElementById('btnAdvStop').disabled = true;
    // v7.54: 恢复其他页面标签
    document.querySelectorAll('.nav-btn[data-page]').forEach(function(btn) {
        btn.disabled = false;
        btn.style.opacity = '';
        btn.style.cursor = '';
    });
}

function renderAdvResult(data) {
    const resultEl = document.getElementById('advResult');
    // v7.52: 修复字段名不匹配:后端返回 functions(不是 results)
    const results = data.functions || data.results || data;

    // 检测结果类型
    if (results.pan_min !== undefined || results.tilt_min !== undefined) {
        // 限位测试结果
        let html = '<table style="width:100%;font-size:11px;border-collapse:collapse">';
        html += '<tr style="border-bottom:1px solid #30363d"><th style="text-align:left;padding:4px">轴</th><th style="text-align:center;padding:4px">下限</th><th style="text-align:right;padding:4px">上限</th></tr>';

        if (results.pan_min !== undefined) {
            html += '<tr style="border-bottom:1px solid #21262d"><td style="padding:4px">P轴</td><td style="text-align:center;padding:4px">' + results.pan_min + '</td><td style="text-align:right;padding:4px">' + results.pan_max + '</td></tr>';
        }
        if (results.tilt_min !== undefined) {
            html += '<tr style="border-bottom:1px solid #21262d"><td style="padding:4px">T轴</td><td style="text-align:center;padding:4px">' + results.tilt_min + '</td><td style="text-align:right;padding:4px">' + results.tilt_max + '</td></tr>';
        }
        if (results.zoom_min !== undefined) {
            html += '<tr style="border-bottom:1px solid #21262d"><td style="padding:4px">Z轴</td><td style="text-align:center;padding:4px">' + results.zoom_min + '</td><td style="text-align:right;padding:4px">' + results.zoom_max + '</td></tr>';
        }

        html += '</table>';

        // v7.54: P轴限位状态 + T轴翻转状态
        if (results.pan_has_limit !== undefined || results.has_flip !== undefined) {
            html += '<div style="margin-top:8px;padding:8px;background:#161b22;border-radius:4px">';
            if (results.pan_has_limit !== undefined) {
                html += '<div>';
                html += '<span style="color:#8b949e">P轴(水平)限位:</span> ';
                html += results.pan_has_limit ? '<span style="color:#3fb950">✓ 是</span>' : '<span style="color:#f85149">✗ 否</span>';
                html += '</div>';
            }
            if (results.has_flip !== undefined) {
                html += '<div style="margin-top:4px">';
                html += '<span style="color:#8b949e">T轴(垂直)自动翻转:</span> ';
                html += results.has_flip ? '<span style="color:#3fb950">✓ 是</span>' : '<span style="color:#f85149">✗ 否</span>';
                html += '</div>';
            }
            html += '</div>';
        }

        resultEl.innerHTML = html;
    } else if (results.speed_map !== undefined || results.pan_speed !== undefined) {
        // 速度测试结果
        let html = '<div style="font-size:12px">';
        html += '<div style="margin-bottom:8px;font-weight:600;color:#58a6ff">⚡ 速度测试结果</div>';
        html += '<div style="margin-bottom:8px;color:#8b949e">';
        html += '档位: <b>' + (results.speed_profile || '-') + '</b> | ';
        html += '测试数: <b>' + (results.total_tests || 0) + '</b>';
        html += '</div>';

        // Speed table
        if (results.pan_speed || results.tilt_speed) {
            html += '<table style="width:100%;font-size:11px;border-collapse:collapse;margin-top:8px">';
            html += '<tr style="border-bottom:1px solid #30363d"><th style="text-align:left;padding:4px">速度档位</th><th style="text-align:center;padding:4px">Pan (°/s)</th><th style="text-align:right;padding:4px">Tilt (°/s)</th></tr>';
            
            const panSpeed = results.pan_speed || {};
            const tiltSpeed = results.tilt_speed || {};
            const allLevels = new Set([...Object.keys(panSpeed), ...Object.keys(tiltSpeed)]);
            
            for (const level of Array.from(allLevels).sort((a,b) => a - b)) {
                html += '<tr style="border-bottom:1px solid #21262d">';
                html += '<td style="padding:4px">' + level + '</td>';
                html += '<td style="text-align:center;padding:4px">' + (panSpeed[level] || '-') + '</td>'; 
                html += '<td style="text-align:right;padding:4px">' + (tiltSpeed[level] || '-') + '</td>'; 
                html += '</tr>'; 
            }
            html += '</table>'; 
        }
        // ZOOM分组表格
        if (results.by_zoom) {
            html += '<div style="margin-top:12px;font-weight:600;color:#58a6ff">🔍 ZOOM分组速度</div>'; 
            html += '<table style="width:100%;font-size:11px;border-collapse:collapse;margin-top:8px">';
            html += '<tr style="border-bottom:1px solid #30363d"><th style="text-align:left;padding:4px">Zoom</th><th style="text-align:center;padding:4px">档位</th><th style="text-align:center;padding:4px">Pan (°/s)</th><th style="text-align:right;padding:4px">Tilt (°/s)</th></tr>'; 
            for (const [zoomVal, axisData] of Object.entries(results.by_zoom).sort((a,b) => a - b)) {
                const panData = axisData.pan || {}; 
                const tiltData = axisData.tilt || {}; 
                const levels = new Set([...Object.keys(panData), ...Object.keys(tiltData)]);
                for (const level of Array.from(levels).sort((a,b) => a - b)) {
                    html += '<tr style="border-bottom:1px solid #21262d">'; 
                    html += '<td style="padding:4px">' + zoomVal + '</td>'; 
                    html += '<td style="text-align:center;padding:4px">' + level + '</td>'; 
                    html += '<td style="text-align:center;padding:4px">' + (panData[level] || '-') + '</td>'; 
                    html += '<td style="text-align:right;padding:4px">' + (tiltData[level] || '-') + '</td>'; 
                    html += '</tr>'; 
                }
            }
            html += '</table>'; 
        }
        html += '</div>'; 
        resultEl.innerHTML = html;
    } else {
        // 功能测试结果
        let html = '<table style="width:100%;font-size:11px;border-collapse:collapse">';
        html += '<tr style="border-bottom:1px solid #30363d"><th style="text-align:left;padding:4px">项目</th><th style="text-align:center;padding:4px">支持</th><th style="text-align:right;padding:4px">范围</th></tr>';

        for (const [key, val] of Object.entries(results)) {
            if (typeof val === 'object' && val !== null) {
                const label = val.label || key;
                const supported = val.supported ? 'Y' : 'N';
                // v7.52: 兼容两种字段名:min/min_val, max/max_val
                const range = (val.min || val.min_val || '-') + '~' + (val.max || val.max_val || '-');
                html += '<tr style="border-bottom:1px solid #21262d"><td style="padding:4px">' + label + '</td><td style="text-align:center;padding:4px">' + supported + '</td><td style="text-align:right;padding:4px">' + range + '</td></tr>';
            }
        }

        html += '</table>';
        resultEl.innerHTML = html;
    }
}

// 天文校准功能
let astroCalSession = null;
let astroCalMethod = 'manual'; // 'manual' or 'auto'

function startAstroCalibration() {
    var deviceIp = window.connectedDevice ? window.connectedDevice.ip : null;
    if (!deviceIp) { addAdvOutput('error', '请先连接设备'); return; }
    addAdvOutput('info', '启动天文校准...');

    // 获取观测站位置(从配置或默认值)
    const obsLat = window.astroCalConfig?.obs_lat || 29.45;
    const obsLon = window.astroCalConfig?.obs_lon || 100.33;

    fetch('/api/v1/calibrate/start', {
        method: 'POST',
        headers: {'Content-Type': 'application/json'},
        body: JSON.stringify({
            device_ip: deviceIp,
            obs_lat: obsLat,
            obs_lon: obsLon,
            method: astroCalMethod
        })
    })
    .then(r => r.json())
    .then(data => {
        if (data.success) {
            astroCalSession = deviceIp;
            addAdvOutput('success', '校准会话已创建');

            if (astroCalMethod === 'manual' && data.recommended_stars) {
                showAstroCalStars(data.recommended_stars);
            } else {
                addAdvOutput('info', '请拍摄天空进行星图解析');
            }

            renderAstroCalPanel();
        } else {
            addAdvOutput('error', data.message || '启动失败');
        }
    })
    .catch(e => {
        addAdvOutput('error', '请求异常: ' + e.message);
    });
}

function showAstroCalStars(stars) {
    addAdvOutput('info', '推荐校准星:');
    stars.forEach((star, i) => {
        addAdvOutput('test', (i+1) + '. ' + star.name + ' (Az=' + star.az.toFixed(1) + ', Alt=' + star.alt.toFixed(1) + ')');
    });
}

    const resultEl = document.getElementById('advResult');

    let html = '<div style="font-size:12px">';
    html += '<div style="margin-bottom:8px;font-weight:600;color:#58a6ff">🌟 天文校准</div>';

    // 校准方法选择
    html += '<div style="margin-bottom:12px">';

function loadAstroCalStars() {

function recordAstroCalPoint() {
    if (!astroCalSession || !window.connectedDevice) {
        addAdvOutput('error', '请先启动校准');
        return;
    }

    const starSelect = document.getElementById('astroCalStar');
    const starName = starSelect ? starSelect.value : '';

    if (!starName) {
        addAdvOutput('warn', '请先选择恒星');
        return;
    }

    // 先选择恒星
    fetch('/api/v1/calibrate/select_star', {
        method: 'POST',
        headers: {'Content-Type': 'application/json'},
        body: JSON.stringify({
            device_ip: astroCalSession,
            star_name: starName
        })
    })
    .then(r => r.json())
    .then(data => {
        if (!data.success) {
            addAdvOutput('error', data.message || '选择失败');
            return;
        }

        // 从后端缓存获取当前PTZ位置并记录
        return apiGet('/api/v1/ptz/' + astroCalSession + '/position').then(function(pos) {
            var pan = (pos && pos.success && pos.data) ? (pos.data.pan || 0) : 0;
            var tilt = (pos && pos.success && pos.data) ? (pos.data.tilt || 0) : 0;
            return fetch('/api/v1/calibrate/record', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({
                    device_ip: astroCalSession,
                    pan: pan,
                    tilt: tilt
                })
            });
        });
    })
    .then(r => r && r.json())
    .then(data => {
        if (data && data.success) {
            addAdvOutput('success', '记录校准点 #' + data.point_index);
            updateAstroCalStatus(data.coverage);
        } else if (data) {
            addAdvOutput('error', data.message || '记录失败');
        }
    })
    .catch(e => addAdvOutput('error', '请求异常: ' + e.message));
}

function captureAndSolve() {
    if (!astroCalSession) {
        addAdvOutput('error', '请先启动校准');
        return;
    }

    addAdvOutput('info', '拍摄并解析中...');

    apiGet('/api/v1/ptz/' + astroCalSession + '/position').then(function(pos) {
        var pan = (pos && pos.success && pos.data) ? (pos.data.pan || 0) : 0;
        var tilt = (pos && pos.success && pos.data) ? (pos.data.tilt || 0) : 0;
        return fetch('/api/v1/calibrate/capture', {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({
                device_ip: astroCalSession,
                pan: pan,
                tilt: tilt
            })
        });
    }).then(function(resp) { return resp.json(); })
    .then(data => {
        if (data.success) {
            addAdvOutput('success', '解析成功: RA=' + data.ra.toFixed(2) + 'h, DEC=' + data.dec.toFixed(2) + '°');
            updateAstroCalStatus(data.coverage);
        } else {
            addAdvOutput('error', data.message || '解析失败');
        }
    })
    .catch(e => addAdvOutput('error', '请求异常: ' + e.message));

function updateAstroCalStatus(coverage) {
    const statusEl = document.getElementById('astroCalStatus');
    if (!statusEl || !coverage) return;

    let html = '校准点: ' + (coverage.total_points || 0) + ' | ';
    html += 'Az覆盖: ' + coverage.az_spread.toFixed(0) + '° | ';
    html += 'Alt覆盖: ' + coverage.alt_spread.toFixed(0) + '°';

    if (coverage.needs_more) {
        html += '<br><span style="color:#d29922">需要更多校准点</span>';
    } else {

// v7.52: 轮询进度函数
var advPollInterval = null;
var advTaskId = null;

function pollAdvProgress(taskId) {
    advTaskId = taskId;
    var progressEl = document.getElementById('advProgress');
    var pollUrl = '/api/v1/advanced/detect/status/' + taskId;

    // 清除之前的轮询
    if (advPollInterval) clearInterval(advPollInterval);

    // v7.53: 添加去重逻辑,避免重复输出
    var lastStep = '';

    advPollInterval = setInterval(function() {
        fetch(pollUrl)
        .then(r => r.json())
        .then(data => {
            if (data.success) {
                // v7.52: 后端返回的字段直接在根级别(没有task包裹)
                var progress = data.progress || 0;
                var step = data.current_step || 'running';
                var status = data.status || 'running';

                // v7.52: 更新进度显示(N/M格式)
                var completedItems = data.completed_items || 0;
                var totalItems = data.total_items || 0;
                if (progressEl) {
                    if (totalItems > 0) {
                        progressEl.textContent = currentAdvTest + ' (' + completedItems + '/' + totalItems + ')';
                    } else {
                        progressEl.textContent = currentAdvTest + ' ' + progress.toFixed(0) + '%';
                    }
                }

                // v7.53: 实时输出当前检测端点(去重:只在步骤变化时输出)
                if (step && step !== 'running' && step !== 'completed' && step !== lastStep) {
                    var lastResult = data.last_result || '';
                    addAdvOutput(lastResult === 'pass' ? 'success' : (lastResult === 'failed' ? 'error' : 'info'),
                        '检测端点: ' + step + '...' + (lastResult || ''));
                    lastStep = step;
                }

                // v7.53: 检查是否完成(使用getElementById获取按钮,因为是局部变量)
                if (status === 'completed') {
                    clearInterval(advPollInterval);
                    advTaskId = null;
                    // v8.66: 恢复主控台轮询
                    if (window.resumePtzPolling) resumePtzPolling();
                    addAdvOutput('success', '测试完成');
                    document.getElementById('btnAdvRun').disabled = false;
                    document.getElementById('btnAdvStop').disabled = true;
                    // v7.54: 恢复其他页面标签
                    document.querySelectorAll('.nav-btn[data-page]').forEach(function(btn) {
                        btn.disabled = false;
                        btn.style.opacity = '';
                        btn.style.cursor = '';
                    });
                    // 获取最终结果
                    fetchResult(taskId);
                } else if (status === 'failed') {
                    clearInterval(advPollInterval);
                    advTaskId = null;
                    // v8.66: 恢复主控台轮询
                    if (window.resumePtzPolling) resumePtzPolling();
                    addAdvOutput('error', '测试失败: ' + step);
                    document.getElementById('btnAdvRun').disabled = false;
                    document.getElementById('btnAdvStop').disabled = true;
                    // v7.54: 恢复其他页面标签
                    document.querySelectorAll('.nav-btn[data-page]').forEach(function(btn) {
                        btn.disabled = false;
                        btn.style.opacity = '';
                        btn.style.cursor = '';
                    });
                    if (progressEl) progressEl.textContent = currentAdvTest + ' 失败';
                } else if (status === 'cancelled') {
                    clearInterval(advPollInterval);
                    advTaskId = null;
                    // v8.66: 恢复主控台轮询
                    if (window.resumePtzPolling) resumePtzPolling();
                    addAdvOutput('warn', '测试已取消');
                    document.getElementById('btnAdvRun').disabled = false;
                    document.getElementById('btnAdvStop').disabled = true;
                    document.querySelectorAll('.nav-btn[data-page]').forEach(function(btn) {
                        btn.disabled = false;
                        btn.style.opacity = '';
                        btn.style.cursor = '';
                    });
                    if (progressEl) progressEl.textContent = '';
                }
            }
        })
        .catch(e => {
            console.error('Poll error:', e);
        });
    }, 1000); // 每1秒轮询一次
}

function fetchResult(taskId) {
    var resultUrl = '/api/v1/advanced/detect/result/' + taskId;
    fetch(resultUrl)
    .then(r => r.json())
    .then(data => {
        if (data.success && data.results) {
            // v7.52: 从总结果中取当前测试类型的结果
            var testResult = data.results[currentAdvTest] || data.results;
            renderAdvResult(testResult);
            // 更新进度显示完成数量
            var progressEl = document.getElementById('advProgress');
            if (progressEl) {
                var count;
                if (testResult && testResult.total_tests != null) {
                    count = testResult.total_tests;
                } else {
                    var funcs = testResult.functions || testResult;
                    count = typeof funcs === 'object' && funcs ? Object.keys(funcs).length : 0;
                }
                progressEl.textContent = currentAdvTest + ' 完成(' + count + ')';
            }
        }
    })
    .catch(e => {
        addAdvOutput('error', '获取结果失败: ' + e.message);
    });
}

var starAlignSession = null;
var starAlignStars = [];          // 全部星表(含alt/az)
var starAlignSelected = [null, null, null, null];  // 4行的选中星 {hip, display_name, vmag, alt, az, ra, dec}
var starAlignSynced = [false, false, false, false]; // 4行的同步状态
var starAlignPoints = [];         // 已记录的校准点

// 初始化: 加载地理坐标 + 星表
function initStarAlign() {

// 加载星表
function loadStarAlignCatalog(lat, lon) {
    fetch('/api/v1/staralign/catalog?lat=' + lat + '&lon=' + lon)
    .then(r => r.json())
    .then(data => {
        if (data.success) {
            starAlignStars = data.stars;
            // 第1行固定北极星
            var polaris = starAlignStars.find(s => s.hip === 11767) || starAlignStars[0];
            if (polaris) {
                starAlignSelected[0] = polaris;
                document.getElementById('starName0').textContent = polaris.display_name;
                document.getElementById('starInfo0').textContent =
                    'Az=' + polaris.az.toFixed(1) + '° Alt=' + polaris.alt.toFixed(1) + '° V=' + polaris.vmag.toFixed(2);
            }
            // 填充下拉菜单
            refreshStarSelects();
            addAdvOutput('info', '星表已加载: ' + data.count + ' 颗亮星可见');
        }
    })
    .catch(e => addAdvOutput('error', '加载星表失败: ' + e.message));
}

// 刷新下拉菜单(排除已选,优先推荐)
function refreshStarSelects() {
    // 用本地 starAlignStars 填充,固定10颗
    // 排序规则: Alt>25°, Vmag<4.0, 与已选星间距>90°
    // 北极星(第1行)不参与间距计算,第2颗也不和北极星算间距
    for (var row = 1; row <= 3; row++) {
        var select = document.getElementById('starSelect' + row);
        if (!select) continue;

        var currentVal = select.value;
        var excludeHips = [11767]; // 排除北极星
        for (var i = 1; i <= 3; i++) {
            if (i !== row && starAlignSelected[i]) {
                excludeHips.push(starAlignSelected[i].hip);
            }
        }

        // 收集已选星的方位角(用于间距计算)
        // 北极星不参与间距计算; 第2颗也不和北极星算
        var refAzs = [];
        if (row >= 3) {  // 第3颗才开始算间距
            for (var i = 1; i <= 3; i++) {
                if (i !== row && starAlignSelected[i] && starAlignSelected[i].hip !== 11767) {
                    refAzs.push(starAlignSelected[i].az);
                }
            }
        }

        // 过滤+排序
        var candidates = [];
        starAlignStars.forEach(function(s) {
            if (excludeHips.indexOf(s.hip) >= 0) return;
            if (s.alt < 25 || s.vmag > 4.0) return;
            // 计算与已选星的最小间距
            var minSep = 360;
            for (var j = 0; j < refAzs.length; j++) {
                var sep = Math.abs(s.az - refAzs[j]);
                if (sep > 180) sep = 360 - sep;
                if (sep < minSep) minSep = sep;
            }
            // row=1或2时refAzs为空,minSep=360,所有星都满足>90°
            candidates.push({star: s, minSep: minSep});
        });

        // 按间距降序排(间距大的优先),间距相同时按亮度排
        candidates.sort(function(a, b) {
            if (b.minSep !== a.minSep) return b.minSep - a.minSep;
            return a.star.vmag - b.star.vmag;
        });

        // 取前10颗
        var top10 = candidates.slice(0, 10);
        // 再按亮度排序显示
        top10.sort(function(a, b) {
            return a.star.vmag - b.star.vmag;
        });

        select.innerHTML = '<option value="">选择星体...</option>';
        top10.forEach(function(c) {
            var s = c.star;
            select.innerHTML += '<option value="' + s.hip + '">' + s.display_name +
                ' (Az=' + s.az.toFixed(0) + '° Alt=' + s.alt.toFixed(0) + '° V=' + s.vmag.toFixed(1) + ')</option>';
        });

        if (currentVal) select.value = currentVal;
    }
}

// 下拉选择星体
function onStarSelect(row) {
    var select = document.getElementById('starSelect' + row);
    var hip = parseInt(select.value);
    if (!hip) {
        starAlignSelected[row] = null;
        document.getElementById('starInfo' + row).textContent = '';
        return;
    }

    var star = starAlignStars.find(s => s.hip === hip);
    if (!star) return;

    starAlignSelected[row] = star;
    starAlignSynced[row] = false;
    document.getElementById('starInfo' + row).textContent =
        'Az=' + star.az.toFixed(1) + '° Alt=' + star.alt.toFixed(1) + '° V=' + star.vmag.toFixed(2);

    addAdvOutput('info', '已选择 ' + star.display_name);
    refreshStarSelects();
}

// 同步星点(PTZ居中后点击) — 等待下一次主控台轮询获取位置
// 应用校准点（读取当前PTZ位置 → 添加到求解器 → 更新模型）
function applyStarPoint(row) {
    if (!starAlignSession) {
        addAdvOutput('error', '请先点击「开始」');
        return;
    }
    var star = starAlignSelected[row];
    if (!star) {
        addAdvOutput('warn', '请先选择星体');
        return;
    }
    if (!window.connectedDevice) {
        addAdvOutput('error', '未连接设备');
        return;
    }
    var deviceIp = window.connectedDevice.ip;

    // 禁用按钮
    var btns = document.getElementById('starRow' + row).querySelectorAll('.star-btn');
    btns.forEach(function(b) { b.disabled = true; });
    addAdvOutput('info', '正在记录 ' + star.display_name + '...');

    fetch('/api/v1/staralign/apply', {
        method: 'POST',
        headers: {'Content-Type': 'application/json'},
        body: JSON.stringify({
            device_ip: deviceIp,
            star_hip: star.hip
        })
    })
    .then(r => r.json())
    .then(data => {
        if (data.success) {
            starAlignSynced[row] = true;
            starAlignPoints.push({row: row, hip: star.hip, name: star.display_name});
            var msg = '已应用 ' + star.display_name;
            if (data.model_updated) {
                msg += ' | 模型已更新: ' + data.quality;
                if (data.params) {
                    var p = data.params;
                    msg += ' IA=' + (p.IA || 0).toFixed(2) + '° IE=' + (p.IE || 0).toFixed(2) + '°';
                }
            }
            addAdvOutput('success', msg);

            // 检查是否4点全部完成
            var syncedCount = starAlignSynced.filter(function(x) { return x; }).length;
            if (syncedCount >= 4) {
                document.getElementById('btnStarAlignSave').disabled = false;
                addAdvOutput('info', '4个校准点已全部完成，可以保存');
            }
        } else {
            addAdvOutput('error', data.message || '应用失败');
        }
        btns.forEach(function(b) { b.disabled = false; });
    })
    .catch(function(e) {
        addAdvOutput('error', '请求异常: ' + e.message);
        btns.forEach(function(b) { b.disabled = false; });
    });
}

// 开始校准
function startStarAlign() {
    if (!window.connectedDevice) {
        addAdvOutput('error', '请先连接设备');
        return;
    }
    var deviceIp = window.connectedDevice.ip;
    var lat = (window.astroCalConfig && window.astroCalConfig.obs_lat) || 29.45;
    var lon = (window.astroCalConfig && window.astroCalConfig.obs_lon) || 100.33;

    addAdvOutput('info', '正在初始化三星校准...');

    fetch('/api/v1/staralign/start', {
        method: 'POST',
        headers: {'Content-Type': 'application/json'},
        body: JSON.stringify({device_ip: deviceIp, obs_lat: lat, obs_lon: lon})
    })
    .then(r => r.json())
    .then(data => {
        if (data.success) {
            starAlignSession = deviceIp;
            starAlignSynced = [false, false, false, false];
            starAlignPoints = [];

            // 更新北极星信息
            if (data.polaris) {
                var p = data.polaris;
                document.getElementById('starName0').textContent = p.display_name;
                document.getElementById('starInfo0').textContent =
                    'Az=' + p.az.toFixed(1) + '° Alt=' + p.alt.toFixed(1) + '° V=' + p.vmag.toFixed(2);
                starAlignSelected[0] = p;
            }

            // 重置状态（移除 starStatus 相关代码）
            // 启用所有星行按钮
            document.querySelectorAll('.star-btn').forEach(function(b) { b.disabled = false; });

            document.getElementById('btnStarAlignStart').disabled = true;
            document.getElementById('btnStarAlignReset').disabled = false;
            document.getElementById('btnStarAlignSave').disabled = true;

            addAdvOutput('success', '校准会话已启动');
            addAdvOutput('info', '观测站: ' + lat + '°N, ' + lon + '°E');
            addAdvOutput('info', '请将PTZ对准北极星并居中，然后点击同步');
        } else {
            addAdvOutput('error', data.message || '启动失败');
        }
    })
    .catch(e => addAdvOutput('error', '请求异常: ' + e.message));
}

// 计算校准参数
function computeStarAlign() {
    if (!starAlignSession) {
        addAdvOutput('error', '请先开始校准');
        return;
    }
    addAdvOutput('info', '正在计算校准参数...');

    fetch('/api/v1/staralign/compute', {
        method: 'POST',
        headers: {'Content-Type': 'application/json'},
        body: JSON.stringify({device_ip: starAlignSession})
    })
    .then(r => r.json())
    .then(data => {
        if (data.success) {
            var p = data.params;
            var rms = data.rms;
            addAdvOutput('success', '🎉 校准完成！');
            addAdvOutput('info', 'IA=' + (p.IA || 0).toFixed(3) + '°  IE=' + (p.IE || 0).toFixed(3) + '°  NPAE=' + (p.NPAE || 0).toFixed(3) + '°');
            addAdvOutput('info', '底座倾斜=' + (p.tilt_magnitude || 0).toFixed(3) + '° @ ' + (p.tilt_direction || 0).toFixed(1) + '°');
            addAdvOutput('info', 'RMS: Az=' + (rms.az_rms || 0).toFixed(4) + '°  Alt=' + (rms.alt_rms || 0).toFixed(4) + '°');
            addAdvOutput('info', '评级: ' + data.quality);

            // 在结果区显示
            var resultEl = document.getElementById('advResult');
            resultEl.innerHTML = '<div style="font-size:12px">' +
                '<div style="font-weight:600;color:#58a6ff;margin-bottom:8px">🌟 三星校准结果</div>' +
                '<div class="status-row"><span>IA (方位零点)</span><span>' + (p.IA || 0).toFixed(3) + '°</span></div>' +
                '<div class="status-row"><span>IE (高度零点)</span><span>' + (p.IE || 0).toFixed(3) + '°</span></div>' +
                '<div class="status-row"><span>NPAE (轴不正交)</span><span>' + (p.NPAE || 0).toFixed(3) + '°</span></div>' +
                '<div class="status-row"><span>底座倾斜量</span><span>' + (p.tilt_magnitude || 0).toFixed(3) + '°</span></div>' +
                '<div class="status-row"><span>倾斜方向</span><span>' + (p.tilt_direction || 0).toFixed(1) + '°</span></div>' +
                '<div class="status-row"><span>RMS (Az)</span><span>' + (rms.az_rms || 0).toFixed(4) + '°</span></div>' +
                '<div class="status-row"><span>RMS (Alt)</span><span>' + (rms.alt_rms || 0).toFixed(4) + '°</span></div>' +
                '<div class="status-row"><span>评级</span><span>' + data.quality + '</span></div>' +
                '</div>';

            document.getElementById('btnStarAlignSave').disabled = false;
        } else {
            addAdvOutput('error', data.message || '计算失败');
        }
    })
    .catch(e => addAdvOutput('error', '请求异常: ' + e.message));
}

// 保存校准
function saveStarAlign() {
    if (!starAlignSession) {
        addAdvOutput('error', '请先完成校准计算');
        return;
    }
    fetch('/api/v1/staralign/save', {
        method: 'POST',
        headers: {'Content-Type': 'application/json'},
        body: JSON.stringify({device_ip: starAlignSession, params: {}})
    })
    .then(r => r.json())
    .then(data => {
        if (data.success) {
            addAdvOutput('success', '校准参数已保存');
        } else {
            addAdvOutput('error', data.message || '保存失败');
        }
    })
    .catch(e => addAdvOutput('error', '请求异常: ' + e.message));
}

// ==================== v8.92: 视图辅助遮罩层 ====================
var _viewAssistState = _viewAssistState || {};
var _viewAssistColorScheme = 'dark'; // 'dark' or 'bright'
var _viewAssistOpacity = 50; // 统一透明度 0-100

function getVaOpacity(prefix) {
    var slider = document.getElementById(prefix + 'ViewAssistOpacity');
    if (slider) _viewAssistOpacity = parseInt(slider.value);
    return _viewAssistOpacity / 100;
}

// v8.92: 配色方案
var _vaColorSchemes = {
    dark: { GL:'#00FFFF', RT:'#FFD700', AF:'#FF6699', WB:'#FFB347', BR:'#CC99FF' },
    bright: { GL:'#0055CC', RT:'#CC3300', AF:'#0033AA', WB:'#CC6600', BR:'#7722AA' }
};

function getVaColor(type) {
    return _vaColorSchemes[_viewAssistColorScheme][type];
}

// v8.92: 切换配色
function toggleViewAssistScheme(prefix) {
    _viewAssistColorScheme = _viewAssistColorScheme === 'dark' ? 'bright' : 'dark';
    var types = ['GL','RT','AF','WB','BR'];
    types.forEach(function(t) {
        var btn = document.getElementById(prefix + 'VaBtn' + t);
        if (!btn) return;
        var c = getVaColor(t);
        if (_viewAssistState[prefix + t]) {
            btn.style.background = c;
            btn.style.borderColor = c;
        } else if (!btn.classList.contains('va-btn-auto')) {
            btn.style.background = '#333';
            btn.style.borderColor = '#555';
            btn.style.color = '#999';
        }
    });
    updateViewAssistOverlay(prefix);
}

// v8.92: 切换遮罩
function toggleViewAssistMask(prefix, type) {
    var btn = document.getElementById(prefix + 'VaBtn' + type);
    if (btn && btn.classList.contains('va-btn-auto') && !_viewAssistState[prefix + type]) {
        var isActive = checkViewAssistAutoActive(type);
        if (!isActive) return;
    }
    _viewAssistState[prefix + type] = !_viewAssistState[prefix + type];
    if (btn) {
        btn.classList.toggle('active', _viewAssistState[prefix + type]);
        if (_viewAssistState[prefix + type]) {
            var c = getVaColor(type);
            btn.style.background = c;
            btn.style.borderColor = c;
            btn.style.color = '#fff';
        } else {
            btn.style.background = '#333';
            btn.style.borderColor = '#555';
            btn.style.color = '#999';
        }
    }
    updateViewAssistOverlay(prefix);
}

// v8.92: 更新遮罩绘制
function updateViewAssistOverlay(prefix) {
    getVaOpacity(prefix);
    var canvas = document.getElementById(prefix + 'ViewAssistOverlay');
    if (!canvas) return;
    var wrap = canvas.parentElement;
    if (!wrap) return;
    canvas.width = wrap.offsetWidth;
    canvas.height = wrap.offsetHeight;
    var ctx = canvas.getContext('2d');
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    var w = canvas.width, h = canvas.height;
    drawVaGuideLines(ctx, w, h, prefix);
    drawVaReticle(ctx, w, h, prefix);
    drawVaRegion(ctx, w, h, prefix, 'AF');
    drawVaRegion(ctx, w, h, prefix, 'WB');
    drawVaRegion(ctx, w, h, prefix, 'BR');
}

// v8.92: 绘制辅助线
function drawVaGuideLines(ctx, w, h, prefix) {
    if (!_viewAssistState[prefix + 'GL']) return;
    var op = _viewAssistOpacity / 100;
    var color = getVaColor('GL');
    var rgb = hexToRgb(color);
    ctx.strokeStyle = 'rgba(' + rgb + ',' + op * 0.8 + ')';
    ctx.lineWidth = 2; ctx.shadowColor = 'rgba(' + rgb + ',' + op * 0.3 + ')'; ctx.shadowBlur = 3;
    var x1 = w/3, x2 = w*2/3, y1 = h/3, y2 = h*2/3;
    ctx.beginPath();
    ctx.moveTo(x1,0); ctx.lineTo(x1,h); ctx.moveTo(x2,0); ctx.lineTo(x2,h);
    ctx.moveTo(0,y1); ctx.lineTo(w,y1); ctx.moveTo(0,y2); ctx.lineTo(w,y2);
    ctx.stroke(); ctx.shadowBlur = 0;
}

// v8.92: 绘制准心（合并同心圆+十字线）
function drawVaReticle(ctx, w, h, prefix) {
    if (!_viewAssistState[prefix + 'RT']) return;
    var op = _viewAssistOpacity / 100;
    var color = getVaColor('RT');
    var rgb = hexToRgb(color);
    var cx = w/2, cy = h/2;
    // 同心圆（以画面高度为基准）
    var radii = [h*0.25, h*0.15, h*0.05];
    ctx.strokeStyle = 'rgba(' + rgb + ',' + op*0.9 + ')';
    ctx.lineWidth = 2; ctx.shadowColor = 'rgba(' + rgb + ',' + op*0.2 + ')'; ctx.shadowBlur = 2;
    for (var i=0;i<radii.length;i++) { ctx.beginPath(); ctx.arc(cx,cy,radii[i],0,Math.PI*2); ctx.stroke(); }
    // 十字线（40%）
    var len = Math.min(w,h)*0.4;
    ctx.strokeStyle = 'rgba(' + rgb + ',' + op*0.9 + ')';
    ctx.lineWidth = 2; ctx.shadowColor = 'rgba(' + rgb + ',' + op*0.3 + ')'; ctx.shadowBlur = 3;
    ctx.beginPath();
    ctx.moveTo(cx-len,cy); ctx.lineTo(cx+len,cy); ctx.moveTo(cx,cy-len); ctx.lineTo(cx,cy+len);
    ctx.stroke();
    ctx.fillStyle = 'rgba(' + rgb + ',' + op + ')';
    ctx.beginPath(); ctx.arc(cx,cy,2,0,Math.PI*2); ctx.fill();
    ctx.shadowBlur = 0;
}

var _vaRegionColors = _vaRegionColors || {AF:'#FF6699', WB:'#FFB347', BR:'#CC99FF'};
var _vaRegionKeys = _vaRegionKeys || {AF:'region_focus', WB:'region_whitebalance', BR:'region_brightness'};

function drawVaRegion(ctx, w, h, prefix, type) {
    if (!_viewAssistState[prefix + type]) return;
    var op = _viewAssistOpacity / 100;
    var color = getVaColor(type);
    var key = _vaRegionKeys[type];
    var raw = localStorage.getItem(key);
    if (!raw) return;
    try {
        var r = JSON.parse(raw);
        if (r.x===undefined || r.w===undefined) return;
        var rx=r.x*w, ry=r.y*h, rw=r.w*w, rh=r.h*h;
        ctx.strokeStyle = 'rgba(' + hexToRgb(color) + ',' + op*0.8 + ')';
        ctx.lineWidth = 1.5; ctx.setLineDash([4,3]);
        ctx.shadowColor = 'rgba(' + hexToRgb(color) + ',' + op*0.3 + ')'; ctx.shadowBlur = 3;
        ctx.strokeRect(rx,ry,rw,rh); ctx.setLineDash([]);
        ctx.fillStyle = 'rgba(' + hexToRgb(color) + ',' + op*0.8 + ')';
        ctx.font = 'bold 12px sans-serif'; ctx.textBaseline = 'bottom'; ctx.textAlign = 'left';
        ctx.fillText(type, rx+2, ry+12);
        ctx.shadowBlur = 0;
    } catch(e) {}
}

function hexToRgb(hex) {
    var r=parseInt(hex.slice(1,3),16), g=parseInt(hex.slice(3,5),16), b=parseInt(hex.slice(5,7),16);
    return r+','+g+','+b;
}

// v8.93: 检查自动功能是否激活（基于定时器配置状态和后端搜索状态）
function checkViewAssistAutoActive(type) {
    if (type==='AF') return window._focusTimerConfigured === true;
    if (type==='WB') return window._wbTimerConfigured === true;
    if (type==='BR') return window._brightnessTimerConfigured === true;
    return false;
}

// v8.93: 从后端轮询搜索状态并更新辅助视图按钮
function pollSearchState() {
    if (!window.connectedDevice || !window.connectedDevice.ip) return;
    
    var dev = window.connectedDevice.ip;
    apiGet('/api/v1/vision/search-status').then(function(r) {
        if (r && r.success) {
            var activeSearch = r.active; // 'focus' | 'wb' | 'brightness' | null
            
            // 更新定时器配置标志
            if (activeSearch === 'focus') window._focusTimerConfigured = true;
            if (activeSearch === 'wb') window._wbTimerConfigured = true;
            if (activeSearch === 'brightness') window._brightnessTimerConfigured = true;
            
            // 更新两个页面的辅助视图按钮状态
            if (typeof updateVaAutoState === 'function') {
                updateVaAutoState('console');
                updateVaAutoState('adv');
            }
        }
    }).catch(function(e) {
        // 静默处理
    });
}

function initViewAssistOverlay(prefix) {
    _viewAssistState[prefix+'GL']=false; _viewAssistState[prefix+'RT']=false;
    _viewAssistState[prefix+'AF']=false; _viewAssistState[prefix+'WB']=false; _viewAssistState[prefix+'BR']=false;
    ['GL','RT','AF','WB','BR'].forEach(function(t) {
        var btn = document.getElementById(prefix+'VaBtn'+t);
        if (btn) btn.classList.remove('active');
    });
    updateVaAutoState(prefix); updateViewAssistOverlay(prefix);
}

function updateVaAutoState(prefix) {
    ['AF','WB','BR'].forEach(function(t) {
        var btn = document.getElementById(prefix+'VaBtn'+t);
        if (!btn) return;
        var active = checkViewAssistAutoActive(t);
        if (active) {
            btn.classList.remove('va-btn-auto'); btn.style.cursor='pointer'; btn.style.pointerEvents=''; btn.style.opacity='';
            if (_viewAssistState[prefix+t]) btn.classList.add('active');
        } else {
            btn.classList.add('va-btn-auto'); btn.style.cursor='not-allowed'; btn.style.pointerEvents='none';
            _viewAssistState[prefix+t]=false; btn.classList.remove('active');
            updateViewAssistOverlay(prefix);
        }
    });
}

window.addEventListener('resize', function() {
    var canvas = document.getElementById('advViewAssistOverlay');
    if (canvas) updateViewAssistOverlay('adv');
});
</script>
