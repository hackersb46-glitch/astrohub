<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AstroHub</title>
    <style>
        * { margin:0; padding:0; box-sizing:border-box; }
        body { font-family: -apple-system, 'Segoe UI', sans-serif; background:#0a0e17; color:#e0e6f0; min-height:100vh; }
        .header { background:linear-gradient(135deg, #1a1e2e, #0d1117); padding:12px 24px; display:flex; align-items:center; justify-content:space-between; border-bottom:1px solid #21262d; }
        .logo { font-size:24px; font-weight:700; color:#58a6ff; }
        .logo span { color:#f0883e; }
        .version { font-size:12px; color:#8b949e; background:#21262d; padding:2px 8px; border-radius:12px; }
        .status-bar { display:flex; gap:16px; align-items:center; }
        .status-item { display:flex; align-items:center; gap:6px; font-size:13px; }
        .status-dot { width:8px; height:8px; border-radius:50%; }
        .status-dot.green { background:#3fb950; box-shadow:0 0 6px #3fb950; }
        .status-dot.yellow { background:#d29922; box-shadow:0 0 6px #d29922; }
        .status-dot.red { background:#f85149; box-shadow:0 0 6px #f85149; }
        /* 开关样式 */
        .switch { position:relative; display:inline-block; width:36px; height:18px; }
        .switch input { opacity:0; width:0; height:0; }
        .slider { position:absolute; cursor:pointer; top:0; left:0; right:0; bottom:0; background-color:#30363d; transition:.2s; border-radius:18px; }
        .slider:before { position:absolute; content:""; height:12px; width:12px; left:3px; bottom:3px; background-color:#8b949e; transition:.2s; border-radius:50%; }
        input:checked + .slider { background-color:#238636; }
        input:checked + .slider:before { transform:translateX(18px); background-color:#fff; }
        .nav { background:#161b22; padding:8px 24px; display:flex; gap:4px; align-items:center; border-bottom:1px solid #21262d; flex-wrap:wrap; }
        .nav-btn { background:none; border:none; color:#8b949e; padding:8px 16px; cursor:pointer; border-radius:6px; font-size:14px; transition:all 0.2s; }
        .nav-btn:hover { background:#21262d; color:#e0e6f0; }
        .nav-btn.active { background:#238636; color:#fff; }
        /* --- Advanced Page: Left Sidebar Layout --- */
        .advanced-layout { display:flex; gap:0; min-height:600px; }
        .advanced-sidebar { width:200px; background:#161b22; border-right:1px solid #21262d; padding:8px 0; flex-shrink:0; }
        .advanced-sidebar .sidebar-item { background:none; border:none; color:#8b949e; padding:10px 16px; cursor:pointer; font-size:13px; transition:all 0.2s; width:100%; text-align:left; display:block; }
        .advanced-sidebar .sidebar-item:hover { background:#21262d; color:#e0e6f0; }
        .advanced-sidebar .sidebar-item.active { background:#238636; color:#fff; border-left:3px solid #3fb950; }
        .advanced-content { flex:1; min-width:0; padding:20px; }
        .advanced-content .page { display:none; }
        .advanced-content .page.active { display:block; }
        /* --- Observation Page Layout --- */
        .observation-layout { display:grid; grid-template-columns:1fr 1fr; gap:20px; }
        .obs-card { background:#161b22; border:1px solid #21262d; border-radius:10px; padding:16px; }
        .obs-card h3 { font-size:15px; color:#58a6ff; margin-bottom:12px; padding-bottom:8px; border-bottom:1px solid #21262d; }
        .obs-placeholder { color:#6e7681; font-size:13px; padding:20px 0; text-align:center; }
        .obs-actions { margin-top:16px; display:flex; gap:8px; justify-content:flex-end; }
        .main { padding:20px 24px; }
        .page { display:none; }
        .page.active { display:block; }
        .grid { display:grid; grid-template-columns:repeat(auto-fit, minmax(200px, 1fr)); gap:16px; margin-bottom:20px; }
        .card { background:#161b22; border:1px solid #21262d; border-radius:10px; padding:16px; transition:border-color 0.2s; }
        .card:hover { border-color:#30363d; }
        .card-title { font-size:12px; color:#8b949e; text-transform:uppercase; letter-spacing:1px; margin-bottom:8px; }
        .card-value { font-size:32px; font-weight:700; color:#e0e6f0; }
        .card-value.green { color:#3fb950; }
        .card-sub { font-size:12px; color:#6e7681; margin-top:4px; }
        table { width:100%; border-collapse:collapse; }
        th, td { text-align:left; padding:10px 16px; border-bottom:1px solid #21262d; font-size:14px; }
        th { color:#8b949e; font-weight:500; background:#0d1117; }
        tr:hover { background:#161b22; }
        .badge { padding:2px 8px; border-radius:12px; font-size:12px; font-weight:500; }
        .badge.online { background:rgba(63,185,80,0.15); color:#3fb950; }
        .badge.offline { background:rgba(248,81,73,0.15); color:#f85149; }
        .badge.sadp { background:rgba(88,166,255,0.15); color:#58a6ff; }
        .badge.manual { background:rgba(240,136,62,0.15); color:#f0883e; }
        .badge.yes { background:rgba(63,185,80,0.15); color:#3fb950; }
        .badge.no { background:rgba(248,81,73,0.15); color:#f85149; }
        .ptz-controls { display:grid; grid-template-columns:repeat(3, 80px); gap:8px; justify-content:center; margin:20px 0; }
        .ptz-btn { width:80px; height:80px; border:1px solid #30363d; border-radius:10px; background:#161b22; color:#e0e6f0; font-size:24px; cursor:pointer; display:flex; align-items:center; justify-content:center; transition:all 0.15s; }
        .ptz-btn:hover { background:#238636; border-color:#238636; }
        .ptz-btn.center { background:#21262d; cursor:default; }
        .ptz-btn.center:hover { background:#21262d; transform:none; }
        .ptz-btn:active:not(.center) { transform:scale(0.95); }
        .ptz-speed { display:flex; align-items:center; gap:12px; justify-content:center; margin:16px 0; }
        .ptz-speed input[type=range] { width:200px; accent-color:#58a6ff; }
        .form-group { margin-bottom:16px; }
        .form-group label { display:block; font-size:14px; color:#8b949e; margin-bottom:6px; }
        .form-group input, .form-group select { width:100%; padding:10px 12px; background:#0d1117; border:1px solid #30363d; border-radius:6px; color:#e0e6f0; font-size:14px; }
        .form-group input:focus, .form-group select:focus { outline:none; border-color:#58a6ff; }
        .btn { padding:10px 20px; border:none; border-radius:6px; font-size:14px; cursor:pointer; transition:all 0.2s; }
        .btn-primary { background:#238636; color:#fff; }
        .btn-primary:hover { background:#2ea043; }
        .btn-secondary { background:#30363d; color:#e0e6f0; }
        .btn-secondary:hover { background:#484f58; }
        .btn-danger { background:#da3633; color:#fff; }
        .btn-danger:hover { background:#f85149; }
        .btn-warning { background:#d29922; color:#0d1117; }
        .btn-warning:hover { background:#e3b341; }
        .btn-sm { padding:6px 12px; font-size:12px; }
        .btn:disabled { opacity:0.5; cursor:not-allowed; }
        .btn-group { display:flex; gap:8px; flex-wrap:wrap; }
        .progress-bar { height:8px; background:#21262d; border-radius:4px; overflow:hidden; }
        .progress-fill { height:100%; border-radius:4px; transition:width 0.3s; }
        .progress-fill.green { background:#3fb950; }
        .progress-fill.yellow { background:#d29922; }
        .progress-fill.red { background:#f85149; }
        .progress-fill.blue { background:#58a6ff; }
        /* Advanced page status panel */
        .advanced-status-panel { background:#0d1117; border:1px solid #21262d; border-radius:10px; padding:16px; margin:16px 0; }
        .advanced-status-panel h4 { font-size:15px; color:#e0e6f0; margin-bottom:12px; border-bottom:1px solid #21262d; padding-bottom:8px; }
        .status-row { display:flex; justify-content:space-between; padding:6px 0; border-bottom:1px solid #21262d; font-size:14px; }
        .status-row:last-child { border-bottom:none; }
        .status-label { color:#8b949e; }
        .status-value { color:#e0e6f0; font-family:monospace; }
        .adv-header { display:flex; align-items:center; gap:12px; margin-bottom:20px; flex-wrap:wrap; }
        .adv-header select { max-width:300px; }
        .result-table { margin:16px 0; }
        .progress-section { margin:16px 0; }
        .progress-text { font-size:13px; color:#8b949e; margin-bottom:4px; }
        .current-direction { font-size:18px; color:#58a6ff; font-family:monospace; text-align:center; padding:8px; background:#0d1117; border-radius:8px; margin:12px 0; }
        .log-entry { padding:6px 12px; border-left:3px solid #30363d; margin-bottom:4px; font-size:13px; font-family:monospace; }
        .log-entry.info { border-color:#58a6ff; }
        .log-entry.warn { border-color:#d29922; }
        .log-entry.error { border-color:#f85149; }
        .log-entry.success { border-color:#3fb950; }
        /* Toast notification */
        .toast-container { position:fixed; top:60px; right:24px; z-index:9999; display:flex; flex-direction:column; gap:8px; }
        .toast { padding:12px 20px; border-radius:8px; font-size:14px; animation:slideIn 0.3s ease; min-width:250px; max-width:400px; }
        .toast.success { background:#1a4731; border:1px solid #3fb950; color:#3fb950; }
        .toast.error { background:#4d1c1a; border:1px solid #f85149; color:#f85149; }
        .toast.info { background:#1a3a52; border:1px solid #58a6ff; color:#58a6ff; }
        .toast.warning { background:#4a3a1a; border:1px solid #d29922; color:#d29922; }
        @keyframes slideIn { from { transform:translateX(100%); opacity:0; } to { transform:translateX(0); opacity:1; } }
        /* Modal */
        .modal-backdrop { position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.6); z-index:9000; display:flex; align-items:center; justify-content:center; }
        .modal { background:#161b22; border:1px solid #30363d; border-radius:12px; padding:24px; width:400px; max-width:90vw; }
        .modal h3 { margin-bottom:16px; font-size:18px; }
        .modal .btn-group { justify-content:flex-end; margin-top:20px; }
        /* Loading spinner */
        .spinner { display:inline-block; width:16px; height:16px; border:2px solid #30363d; border-top-color:#58a6ff; border-radius:50%; animation:spin 0.8s linear infinite; }
        @keyframes spin { to { transform:rotate(360deg); } }
        .loading { pointer-events:none; opacity:0.7; }
        /* Device actions */
        .actions { display:flex; gap:4px; flex-wrap:wrap; }
        /* PTZ status panel */
        .ptz-position { text-align:center; padding:12px; background:#0d1117; border-radius:8px; margin:12px 0; font-family:monospace; font-size:14px; }
        .toolbar { display:flex; justify-content:space-between; align-items:center; gap:12px; margin-bottom:16px; flex-wrap:wrap; }
        .toolbar-actions { display:flex; gap:8px; }
        .device-info-panel { background:#0d1117; border-radius:8px; padding:16px; margin-top:12px; font-size:13px; }
        .device-info-panel .info-row { display:flex; justify-content:space-between; padding:4px 0; border-bottom:1px solid #21262d; }
        .device-info-panel .info-row:last-child { border-bottom:none; }
        .device-info-panel .info-label { color:#8b949e; }
        .device-info-panel .info-value { color:#e0e6f0; font-family:monospace; }
        @media (max-width:768px) { .grid { grid-template-columns:1fr 1fr; } .header { flex-direction:column; gap:8px; } .nav { overflow-x:auto; } .console-layout { flex-direction:column !important; } .console-left, .console-center, .console-right { width:100% !important; } }
        /* Console page: left-right layout (SPEC: left=joystick, right=display) */
        .console-layout { display:flex; gap:20px; align-items:flex-start; }
        .console-left { flex:0 0 320px; display:flex; flex-direction:column; }
        .console-center { flex:1; min-width:0; display:flex; flex-direction:column; }
        .console-right { flex:0 0 25%; max-width:300px; display:flex; flex-direction:column; }
    </style>
</head>
<body>
    <div class="header">
        <div class="logo">Astro<span>Hub</span></div>
        <div class="status-bar">
            <div class="status-item"><span class="status-dot red" id="wsDot"></span><span id="wsStatus">ISAPI: 未连接</span></div>
            <div class="status-item"><span class="status-dot red" id="wasmDot"></span><span id="wasmStatus">视频: 未连接</span></div>
            <div class="status-item" id="clock"></div>
            <!-- 快速连接开关 -->
            <div class="status-item">
                <span style="color:#8b949e;font-size:12px">快速连接</span>
                <label class="switch">
                    <input type="checkbox" id="quickConnectSwitch" onchange="quickConnect(this.checked)">
                    <span class="slider"></span>
                </label>
            </div>
            <!-- 重启按钮 -->
            <button class="btn btn-secondary btn-sm" onclick="confirmRestart()" style="padding:2px 8px">重启</button>
            <span class="version">v7.12</span>
        </div>
    </div>
    <div class="nav">
        <button class="nav-btn active" data-page="dashboard">仪表盘</button>
        <button class="nav-btn" data-page="devices">设备管理</button>
        <button class="nav-btn" data-page="console">主控台</button>
        <button class="nav-btn" data-page="observation">观测计划</button>
        <!-- Advanced Features: 校准 功能测试 限位测试 速度测试 推流/存储 -->
        <button class="nav-btn" data-page="advanced">高级功能</button>
        <button class="nav-btn" data-page="replay">回放</button>
    </div>
    <div class="main">
        <!-- ==================== 仪表盘 ==================== -->

        <!-- ==================== Page Modules ==================== -->
        {% include "includes/dashboard.html" %}
        {% include "includes/devices.html" %}
        {% include "includes/console.html" %}
        {% include "includes/observation.html" %}
        {% include "includes/advanced.html" %}
        {% include "includes/replay.html" %}
    </div>
    <!-- Toast 容器 -->
    <div class="toast-container" id="toastContainer"></div>
    <!-- Modal 容器 -->
    <div id="modalContainer"></div>
    <!-- WASM SDK Plugin Container is in console.html -->
    <script>
        console.log("[MAIN SCRIPT] Starting script execution");
        // WASM SDK global variables (before IIFE)
        var g_szDeviceIdentify = '';
        var g_bLoggedIn = false;
        var g_bPlaying = false;
        var g_iRtspPort = 554;
var g_szDeviceIdentify2 = "";
var g_bLoggedIn2 = false;
var g_bPlaying2 = false;
var g_iRtspPort2 = 554;
var g_iWndIndex2 = 0;
var g_iWebSocketPort = 7681;
var g_iStreamType = 3;  // v7.34: 用户选择的码流类型，默认第三码流
        var g_iWndIndex = 0;
var g_iChannelList = [];
var g_iChannelID = 1;
        var g_iChannelID = 1;
// Global functions
    (function() {
        'use strict';
        // ================================================================
        //  Configuration
        // ================================================================
        var API_BASE = window.location.origin;
        var WS_URL = (window.location.protocol === 'https:' ? 'wss' : 'ws') + '://' + window.location.host + '/ws';
        // Cached device data
        var allDevices = [];
        var currentModal = null;
        // --- v3: Global connected device state ---
        // Advanced menu state (now sidebar)
        var advMenuActive = false;
        var advCurrentSub = 'calibration';
        // Onboarding wizard state
        var wizardState = {
            step: 0,
            totalSteps: 5,
            mac: '',
            deviceIP: '',
            runningTest: false,
            testResults: { function: null, limit: null, speed: null }
        };
        // ================================================================
        //  Initialization
        // ================================================================
        function init() {
            console.log('[INIT] init() called');
            updateClock();
            setInterval(updateClock, 1000);
            initNav();
            initPtzSpeed();
            initMouseUp();
            refreshDevices();
            // v6.0: 从后端获取连接状态
            restoreConnectionState();
            addLog('info', 'AstroHub 已启动');
            connectWS();
            loadLocalhostInfo();
        }
        
        // v7.15: 加载本机信息
        function loadLocalhostInfo() {
            apiGet('/api/v1/localhost').then(function(result) {
                if (result.success && result.data) {
                    var info = result.data;
                    document.getElementById('localhost-hostname').textContent = info.hostname || '-';
                    document.getElementById('localhost-cpu').textContent = info.cpu_model || '-';
                    document.getElementById('localhost-ram').textContent = info.ram_gb ? info.ram_gb + ' GB' : '-';
                    var gpu = (info.gpu_names || []).join(', ') || '-';
                    if (info.vram_gb > 0) gpu += ' (' + info.vram_gb + 'GB)';
                    document.getElementById('localhost-gpu').textContent = gpu;
                    document.getElementById('localhost-ip').textContent = info.local_ip || '-';
                    document.getElementById('localhost-gateway').textContent = info.gateway || '-';
                    window.localhostGateway = info.gateway; // 保存网关供后续使用
                    document.getElementById('localhostCard').style.display = 'block';
                    
                    // v7.15: 首次运行，显示提示并重启
                    if (result.first_run) {
                        showStartupProgress();
                    }
                }
            }).catch(function(e) { console.warn('加载本机信息失败:', e); });
        }
        // v7.15: 显示启动进度条
        
        // v7.15: 网页级别弹窗
        window.showAlert = function(message, title) {
            var alertHtml = '<div id="alertModal" class="modal-overlay" onclick="closeAlert()" style="position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.7);display:flex;align-items:center;justify-content:center;z-index:10000">' +
                '<div onclick="event.stopPropagation()" style="background:#1a1e2e;padding:24px;border-radius:12px;min-width:300px;max-width:500px;box-shadow:0 4px 20px rgba(0,0,0,0.5)">' +
                '<h3 style="margin:0 0 16px 0;color:#f0883e">' + (title || '提示') + '</h3>' +
                '<p style="margin:0 0 20px 0;color:#e0e6f0;line-height:1.6">' + message + '</p>' +
                '<button class="btn btn-primary" onclick="closeAlert()" style="width:100%">确定</button></div></div>';
            document.body.insertAdjacentHTML('beforeend', alertHtml);
        };
        window.closeAlert = function() {
            var modal = document.getElementById('alertModal');
            if (modal) modal.remove();
        };
        window.showConfirm = function(message, onConfirm, title) {
            var confirmHtml = '<div id="confirmModal" class="modal-overlay" style="position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.7);display:flex;align-items:center;justify-content:center;z-index:10000">' +
                '<div onclick="event.stopPropagation()" style="background:#1a1e2e;padding:24px;border-radius:12px;min-width:300px;max-width:500px;box-shadow:0 4px 20px rgba(0,0,0,0.5)">' +
                '<h3 style="margin:0 0 16px 0;color:#58a6ff">' + (title || '确认') + '</h3>' +
                '<p style="margin:0 0 20px 0;color:#e0e6f0;line-height:1.6">' + message + '</p>' +
                '<div style="display:flex;gap:12px;justify-content:flex-end">' +
                '<button class="btn btn-secondary" onclick="closeConfirm(false)">取消</button>' +
                '<button class="btn btn-primary" onclick="closeConfirm(true)">确定</button></div></div></div>';
            window._confirmCallback = onConfirm;
            document.body.insertAdjacentHTML('beforeend', confirmHtml);
        };
        window.closeConfirm = function(result) {
            var modal = document.getElementById('confirmModal');
            if (modal) modal.remove();
            if (result && window._confirmCallback) {
                window._confirmCallback();
                window._confirmCallback = null;
            }
        };
        
function showStartupProgress() {
            var progressHtml = '<div id="startupOverlay" style="position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.9);display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:99999">' +
                '<div style="text-align:center;color:#e0e6f0">' +
                '<div style="font-size:24px;margin-bottom:20px">🚀 首次运行，正在收集本机信息...</div>' +
                '<div class="progress-bar" style="width:300px;height:6px;background:#30363d;border-radius:3px;overflow:hidden">' +
                '<div id="startupProgress" style="width:0%;height:100%;background:linear-gradient(90deg,#58a6ff,#3fb950);transition:width 0.3s"></div></div>' +
                '<div style="margin-top:16px;font-size:14px;color:#8b949e">完成后将自动重启</div></div></div>';
            document.body.insertAdjacentHTML('beforeend', progressHtml);
            
            // 模拟进度
            var progress = 0;
            var interval = setInterval(function() {
                progress += Math.random() * 15;
                if (progress > 90) progress = 90;
                document.getElementById('startupProgress').style.width = progress + '%';
            }, 200);
            
            // 3秒后重启
            setTimeout(function() {
                clearInterval(interval);
                document.getElementById('startupProgress').style.width = '100%';
                setTimeout(function() {
                    if (window.quickRestart) {
                        window.quickRestart();
                    } else {
                        location.reload();
                    }
                }, 500);
            }, 3000);
        }
        
        function refreshLocalhostInfo() {
            apiGet('/api/v1/localhost').then(function(result) {
                if (result.success && result.data) {
                    var info = result.data;
                    document.getElementById('localhost-hostname').textContent = info.hostname || '-';
                    document.getElementById('localhost-cpu').textContent = info.cpu_model || '-';
                    document.getElementById('localhost-ram').textContent = info.ram_gb ? info.ram_gb + ' GB' : '-';
                    var gpu = (info.gpu_names || []).join(', ') || '-';
                    if (info.vram_gb > 0) gpu += ' (' + info.vram_gb + 'GB)';
                    document.getElementById('localhost-gpu').textContent = gpu;
                    document.getElementById('localhost-ip').textContent = info.local_ip || '-';
                    document.getElementById('localhost-gateway').textContent = info.gateway || '-';
                    addLog('done', '本机信息已刷新');
                }
            }).catch(function(e) { addLog('error', '刷新失败: ' + e); });
        }
        // v6.0: 从后端恢复连接状态
        function restoreConnectionState() {
            // v7.12: 初始化 WASM 状态为"未连接"
            if (window.updateWasmStatus) window.updateWasmStatus('disconnected');
            // v7.12: 初始状态禁用所有控件
            if (window.disableAllControls) window.disableAllControls('请连接设备');

            apiGet('/api/v1/ptz/connected').then(function(r) {
                if (r && r.success && r.connected && r.device) {
                    // v7.12: 已连接状态
                    window.connectedDevice = r.device;
                    console.log('[v7.12] 已恢复连接:', r.device.ip);

                    // 启用所有控件
                    if (window.enableAllControls) window.enableAllControls();

                    // 更新状态显示
                    if (window.updateDeviceStatus) window.updateDeviceStatus(r.device);

                    // 加载图像参数
                    if (window.loadDeviceImageParams) {

        // ================================================================

        // ================================================================
        function simulateProgress(textId, barId, totalSteps, labels) {
            var current = 0;
            var interval = setInterval(function() {
                current++;
                if (current > totalSteps) { clearInterval(interval); return; }
                var pct = Math.round((current / totalSteps) * 100);
                var textEl = document.getElementById(textId);
                var barEl = document.getElementById(barId);
                if (textEl) textEl.textContent = labels ? labels[current-1] : '处理中... ' + current + '/' + totalSteps;
                if (barEl) barEl.style.width = pct + '%';
            }, 2000);
        }
        function simulateDirections() {
            var dirs = ['P+ 移动中...', 'P- 移动中...', 'T+ 移动中...', 'T- 移动中...'];
            var i = 0;
            var interval = setInterval(function() {
                var el = document.getElementById('limitDirection');
                if (!el) { clearInterval(interval); return; }
                if (i >= dirs.length) { clearInterval(interval); el.textContent = '测试完成 ✓'; el.style.color = '#3fb950'; return; }
                el.textContent = '当前方向: ' + dirs[i];
                i++;
            }, 3000);
        }

        // 一键检测(全部)
        var detectionState = { running: false, step: 0, totalSteps: 3, results: {} };
        function startDetection() {
            var deviceIp = document.getElementById('advConnectDevice').value;
            if (!deviceIp) { showToast('warning', '请先选择设备'); return; }
            var device = allDevices.find(function(d) { return d.ip === deviceIp; });
            var btn = document.getElementById('btnStartDetection');
            btn.disabled = true;
            btn.innerHTML = '<span class="spinner" style="display:inline-block"></span> 检测中...';
            document.getElementById('detectionProgress').style.display = 'block';
            document.getElementById('detectionLog').innerHTML = '';
            detectionState = { running: true, step: 0, totalSteps: 3, results: {}, deviceIp: deviceIp, device: device };
            addDetectionLog('info', '开始一键检测: ' + deviceIp);
            runDetectionStep();
        }
        function runDetectionStep() {
            var state = detectionState;
            if (!state.running) return;
            var steps = [
                { name: '功能检测', url: '/api/v1/advanced/function/run', key: 'function' },
                { name: '限位检测', url: '/api/v1/advanced/limit/run', key: 'limit' },
                { name: '速度检测', url: '/api/v1/advanced/speed/run', key: 'speed' }
            ];
            if (state.step >= steps.length) {
                finishDetection();
                return;
            }
            var stepInfo = steps[state.step];
            var pct = Math.round(((state.step) / state.totalSteps) * 100);
            document.getElementById('detectionProgressText').textContent = '步骤 ' + (state.step + 1) + '/' + state.totalSteps + ': ' + stepInfo.name;
            document.getElementById('detectionProgressBar').style.width = pct + '%';
            addDetectionLog('info', '▶ 运行 ' + stepInfo.name + '...');
            apiPost(stepInfo.url, {
                device_ip: state.deviceIp,
                username: (state.device && state.device.username) || 'admin',
                password: (state.device && state.device.password) || '',
                port: (state.device && state.device.port) || 80
            }).then(function(resp) {
                if (resp && resp.success) {
                    state.results[stepInfo.key] = resp.results || {};
                    addDetectionLog('success', '✅ ' + stepInfo.name + ' 完成');
                } else {
                    addDetectionLog('error', '❌ ' + stepInfo.name + ' 失败: ' + (resp ? resp.message : '未知'));
                }
                state.step++;
                var newPct = Math.round((state.step / state.totalSteps) * 100);
                document.getElementById('detectionProgressBar').style.width = newPct + '%';
                runDetectionStep();
            }).catch(function(e) {
                addDetectionLog('error', '❌ ' + stepInfo.name + ' 异常: ' + e.message);
                state.step++;
                runDetectionStep();
            });
        }

        // PTZ operation log display
        function ptzLog(msg, type='info') {
            const box = document.getElementById('ptzLogBox');
            if (!box) { console.warn('[ptzLog] ptzLogBox not found'); return; }
            const time = new Date().toLocaleTimeString();
            const colors = {
                'info': '#8b949e',
                'success': '#3fb950',
                'error': '#f85149',
                'warning': '#d29922',
                'debug': '#58a6ff'
            };
            const icons = {
                'info': '○',
                'success': '●',
                'error': '×',
                'warning': '△',
                'debug': '◇'
            };
            const color = colors[type] || '#8b949e';
            const icon = icons[type] || '○';
            const entry = document.createElement('div');
            entry.style.cssText = 'color:' + color + ';margin:2px 0;padding:2px 8px;font-size:13px;font-family:monospace';
            entry.textContent = '[' + time + '] ' + icon + ' ' + msg;
            box.insertBefore(entry, box.firstChild);
            if (box.children.length > 50) box.removeChild(box.lastChild);
            console.log('[ptzLog]', msg, type);

            // v6.40: 发送操作日志到后端
            if (typeof apiPost === 'function') {
                try {
                    apiPost('/api/v1/log/operation', {
                        level: type.toUpperCase(),
                        module: 'web',
                        action: 'ptz',
                        detail: msg
                    }).catch(function(e) { console.warn('[LOG] send failed:', e); });
                } catch(e) {}
            }
        }

        function setLiveStackMode(mode) {
            liveStackMode = mode;
            // 更新按钮状态
            document.querySelectorAll('[data-stack]').forEach(function(btn) {
                btn.classList.remove('btn-primary');

        function startLiveStack() {
            if (!window.connectedDevice || !window.connectedDevice.ip) {
                showToast('warning', '请先连接设备');
                return;
            }

            if (liveStackMode === 'off') {
                showToast('warning', '请先选择叠加档位');
                return;
            }

            var deviceIp = window.connectedDevice.ip;
            var hardwareMs = parseFloat(document.getElementById('hardwareExposureMs').value) || 100;

            // 根据档位计算目标曝光
            var exposureMap = {
                '2s': 2, '5s': 5, '10s': 10, '30s': 30
            };
            var targetExposure = parseFloat(exposureMap[liveStackMode]) || 2;

            // 启动 Live Stack
            apiPost('/api/v1/stack/start', {
                device_ip: deviceIp,
                target_exposure: targetExposure,
                hardware_exposure_ms: hardwareMs,
                mode: 'live'
            }).then(function(result) {
                if (result && result.success) {
                    liveStackRunning = true;
                    liveStackTargetFrames = result.target_frames;
                    liveStackFrameCount = 0;

                    showToast('success', 'Live Stack 已启动: ' + result.target_frames + '帧');

                    // 更新按钮状态
                    document.getElementById('btnLiveStackStart').disabled = true;
                    document.getElementById('btnLiveStackStop').disabled = false;
                    document.getElementById('btnLiveStackSave').disabled = true;

                    // 开始采集帧
                    liveStackInterval = setInterval(captureAndSendFrame, hardwareMs);
                } else {
                    showToast('error', result ? result.message : '启动失败');
                }
            }).catch(function(e) {
                showToast('error', '启动异常: ' + e.message);
            });
        }

        function captureAndSendFrame() {
            if (!liveStackRunning) return;

            // 从 WASM Canvas 截图
            var canvas = document.querySelector('#divPlugin canvas');
            if (!canvas) {
                // 尝试其他方式
                canvas = document.getElementById('divPlugin').querySelector('canvas');
            }

            if (!canvas) {
                console.warn('[LiveStack] Canvas not found');
                return;
            }

            try {
                var imageData = canvas.toDataURL('image/jpeg', 0.85);

                // 发送到后端
                apiPost('/api/v1/stack/frame', {
                    device_ip: window.connectedDevice.ip,
                    frame_data: imageData
                }).then(function(result) {
                    if (result && result.success) {
                        liveStackFrameCount = result.frame_count;
                        var progress = Math.round(liveStackFrameCount / liveStackTargetFrames * 100);

                        // 更新状态
                        document.getElementById('liveStackStatus').textContent =
                            '叠加: ' + liveStackFrameCount + '/' + liveStackTargetFrames + ' (' + progress + '%)';

                        // 更新预览
                        if (result.preview_base64) {
                            // 可以显示预览(可选)
                        }

                        // 检查是否完成
                        if (liveStackFrameCount >= liveStackTargetFrames) {
                            stopLiveStack();
                            showToast('success', '叠加完成');
                            document.getElementById('btnLiveStackSave').disabled = false;
                        }
                    }
                }).catch(function(e) {
                    console.warn('[LiveStack] Frame send error:', e.message);
                });
            } catch (e) {
                console.warn('[LiveStack] Capture error:', e.message);
            }
        }

        function stopLiveStack() {
            liveStackRunning = false;

                clearInterval(liveStackInterval);

    // 设备状态指示器更新函数
    window.updateDeviceStatus = function() {
        var dot = document.getElementById('deviceDot');

        var wsDot = document.getElementById('wsDot');
        var wsStatus = document.getElementById('wsStatus');
        var wasmDot = document.getElementById('wasmDot');

        var connected = window.connectedDevice;

        // 获取显示名称:优先用户自定义名称,其次型号,最后 IP
        function getDisplayName(dev) {
            if (!dev) return '未知设备';
            if (dev.name && dev.name.trim()) return dev.name.trim();
            if (dev.device_name && dev.device_name.trim()) return dev.device_name.trim();
            return dev.ip || '未知设备';
        }

        // 更新左侧设备状态
        if (dot && status) {
            if (connected) {
                dot.className = 'status-dot green';
                status.textContent = getDisplayName(connected);
            } else {
                dot.className = 'status-dot red';
                status.textContent = '未连接';
            }
        }

        // 更新右上角 ISAPI 状态
        if (wsDot && wsStatus) {
            if (connected) {
                wsDot.className = 'status-dot green';
                // v6.14: 显示用户自定义名称(name),其次 device_name,最后 IP
                var displayName = connected.name || connected.device_name || connected.ip;
                wsStatus.textContent = 'ISAPI: ' + displayName;
            } else {
                wsDot.className = 'status-dot red';
                wsStatus.textContent = 'ISAPI: 未连接';
            }
        }

        // 更新快速连接开关状态
        if (quickSwitch) {
            quickSwitch.checked = !!connected;
        }

        // v6.35: 刷新设备列表中的开关状态
        if (typeof allDevices !== 'undefined' && allDevices.length > 0) {
            renderDevices(allDevices);
        }

        console.log('[UI] Status updated:', connected ? getDisplayName(connected) : 'none');
    };

    // WASM 状态更新函数 (v6.45: 四种状态)
    window.updateWasmStatus = function(state) {
        var wasmDot = document.getElementById('wasmDot');
        var wasmStatus = document.getElementById('wasmStatus');
        if (!wasmDot || !wasmStatus) return;

        if (state === 'connecting') {
            wasmDot.className = 'status-dot yellow';
            wasmStatus.textContent = '视频: 连接中';
        } else if (state === 'connected') {
            // v6.45: 已连接但未播放,显示"等待渲染"
            wasmDot.className = 'status-dot yellow';
            wasmStatus.textContent = '视频: 等待渲染';
        } else if (state === 'playing') {
            // v6.45: 播放成功
            wasmDot.className = 'status-dot green';
            wasmStatus.textContent = '视频: 播放中';
        } else if (state === 'disconnected') {
            wasmDot.className = 'status-dot red';
            wasmStatus.textContent = '视频: 未连接';
        }
    };

    var _quickConnectSkipNext = false;
    window.quickConnect = function(checked) {
        if (_quickConnectSkipNext) {
            _quickConnectSkipNext = false;
            return;
        }
        if (checked) {
            if (window.connectedDevice && window.connectedDevice.ip) {
                console.log('[QUICK] Already connected');
                return;
            }
            // v6.18: 从后端获取上次连接的设备
            apiGet('/api/v1/ptz/connected').then(function(r) {
                if (r && r.success && r.device) {
                    console.log('[QUICK] Connecting to:', r.device.ip);
                    if (window.connectDevice) {
                        window.connectDevice(r.device.ip);
                    }
                } else {
                    showToast('warning', '无上次连接设备,请执行发现流程');
                    _quickConnectSkipNext = true;
                    document.getElementById('quickConnectSwitch').checked = false;
                }
            }).catch(function(e) {
                showToast('error', '获取设备信息失败');
                _quickConnectSkipNext = true;
                document.getElementById('quickConnectSwitch').checked = false;
            });
        } else {
            if (window.connectedDevice && window.connectedDevice.ip) {
                disconnectDevice(window.connectedDevice.ip);
            }
        }
    };

    // 确认重启
    window.confirmRestart = function() {
        if (!confirm('确定要重启 AstroHub 吗?\n重启期间服务将暂时不可用。')) return;

        showToast('info', '正在重启 AstroHub...');

        // 调用重启 API
        apiPost('/api/v1/system/restart', null).then(function(r) {
            if (r && r.success) {
                showToast('success', '重启中,10秒后自动刷新页面...');
                setTimeout(function() {
                    location.reload();
                }, 10000);
            } else {
                showToast('error', r ? r.message : '重启失败');
            }
        }).catch(function(e) {
            // 即使请求失败,也假设重启成功(服务已停止)
            showToast('warning', '重启中,10秒后自动刷新页面...');
            setTimeout(function() {
                location.reload();
            }, 10000);
        });
    };

    // 页面切换函数
    window.switchPage = function(page) {
        document.querySelectorAll('.nav-btn').forEach(function(b) { b.classList.remove('active'); });
        document.querySelectorAll('.page').forEach(function(p) { p.classList.remove('active'); });
        document.querySelector('[data-page="' + page + '"]').classList.add('active');
        document.getElementById('page-' + page).classList.add('active');
    };

    console.log('[GLOBAL v5.27] Functions ready');
    </script>
</body>
</html>
