        <div class="page active" id="page-dashboard">
            <div class="grid">
                <div class="card">
                    <div class="card-title">PTZ 设备</div>
                    <div class="card-value" id="devCount">0</div>
                    <div class="card-sub"><span id="devOnline" style="font-size:16px;color:#3fb950">0</span> 在线 / <span id="devTotal" style="font-size:16px">0</span> 总计</div>
                </div>
                <div class="card">
