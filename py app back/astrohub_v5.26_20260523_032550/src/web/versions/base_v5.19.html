<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AstroHub</title>
    <style>
        * { margin:0; padding:0; box-sizing:border-box; }
        body { font-family: -apple-system, 'Segoe UI', sans-serif; background:#0a0e17; color:#e0e6f0; min-height:100vh; }
        .header { background:linear-gradient(135deg, #1a1e2e, #0d1117); padding:12px 24px; display:flex; align-items:center; justify-content:space-between; border-bottom:1px solid #21262d; }
        .logo { font-size:24px; font-weight:700; color:#58a6ff; }
        .logo span { color:#f0883e; }
        .version { font-size:12px; color:#8b949e; background:#21262d; padding:2px 8px; border-radius:12px; }
        .status-bar { display:flex; gap:16px; align-items:center; }
        .status-item { display:flex; align-items:center; gap:6px; font-size:13px; }
        .status-dot { width:8px; height:8px; border-radius:50%; }
        .status-dot.green { background:#3fb950; box-shadow:0 0 6px #3fb950; }
        .status-dot.yellow { background:#d29922; box-shadow:0 0 6px #d29922; }
        .status-dot.red { background:#f85149; box-shadow:0 0 6px #f85149; }
        .nav { background:#161b22; padding:8px 24px; display:flex; gap:4px; align-items:center; border-bottom:1px solid #21262d; flex-wrap:wrap; }
        .nav-btn { background:none; border:none; color:#8b949e; padding:8px 16px; cursor:pointer; border-radius:6px; font-size:14px; transition:all 0.2s; }
        .nav-btn:hover { background:#21262d; color:#e0e6f0; }
        .nav-btn.active { background:#238636; color:#fff; }
        /* --- Advanced Page: Left Sidebar Layout --- */
        .advanced-layout { display:flex; gap:0; min-height:600px; }
        .advanced-sidebar { width:200px; background:#161b22; border-right:1px solid #21262d; padding:8px 0; flex-shrink:0; }
        .advanced-sidebar .sidebar-item { background:none; border:none; color:#8b949e; padding:10px 16px; cursor:pointer; font-size:13px; transition:all 0.2s; width:100%; text-align:left; display:block; }
        .advanced-sidebar .sidebar-item:hover { background:#21262d; color:#e0e6f0; }
        .advanced-sidebar .sidebar-item.active { background:#238636; color:#fff; border-left:3px solid #3fb950; }
        .advanced-content { flex:1; min-width:0; padding:20px; }
        .advanced-content .page { display:none; }
        .advanced-content .page.active { display:block; }
        /* --- Observation Page Layout --- */
        .observation-layout { display:grid; grid-template-columns:1fr 1fr; gap:20px; }
        .obs-card { background:#161b22; border:1px solid #21262d; border-radius:10px; padding:16px; }
        .obs-card h3 { font-size:15px; color:#58a6ff; margin-bottom:12px; padding-bottom:8px; border-bottom:1px solid #21262d; }
        .obs-placeholder { color:#6e7681; font-size:13px; padding:20px 0; text-align:center; }
        .obs-actions { margin-top:16px; display:flex; gap:8px; justify-content:flex-end; }
        .main { padding:20px 24px; }
        .page { display:none; }
        .page.active { display:block; }
        .grid { display:grid; grid-template-columns:repeat(auto-fit, minmax(200px, 1fr)); gap:16px; margin-bottom:20px; }
        .card { background:#161b22; border:1px solid #21262d; border-radius:10px; padding:16px; transition:border-color 0.2s; }
        .card:hover { border-color:#30363d; }
        .card-title { font-size:12px; color:#8b949e; text-transform:uppercase; letter-spacing:1px; margin-bottom:8px; }
        .card-value { font-size:32px; font-weight:700; color:#e0e6f0; }
        .card-value.green { color:#3fb950; }
        .card-sub { font-size:12px; color:#6e7681; margin-top:4px; }
        table { width:100%; border-collapse:collapse; }
        th, td { text-align:left; padding:10px 16px; border-bottom:1px solid #21262d; font-size:14px; }
        th { color:#8b949e; font-weight:500; background:#0d1117; }
        tr:hover { background:#161b22; }
        .badge { padding:2px 8px; border-radius:12px; font-size:12px; font-weight:500; }
        .badge.online { background:rgba(63,185,80,0.15); color:#3fb950; }
        .badge.offline { background:rgba(248,81,73,0.15); color:#f85149; }
        .badge.sadp { background:rgba(88,166,255,0.15); color:#58a6ff; }
        .badge.manual { background:rgba(240,136,62,0.15); color:#f0883e; }
        .badge.yes { background:rgba(63,185,80,0.15); color:#3fb950; }
        .badge.no { background:rgba(248,81,73,0.15); color:#f85149; }
        .ptz-controls { display:grid; grid-template-columns:repeat(3, 80px); gap:8px; justify-content:center; margin:20px 0; }
        .ptz-btn { width:80px; height:80px; border:1px solid #30363d; border-radius:10px; background:#161b22; color:#e0e6f0; font-size:24px; cursor:pointer; display:flex; align-items:center; justify-content:center; transition:all 0.15s; }
        .ptz-btn:hover { background:#238636; border-color:#238636; }
        .ptz-btn.center { background:#21262d; cursor:default; }
        .ptz-btn.center:hover { background:#21262d; transform:none; }
        .ptz-btn:active:not(.center) { transform:scale(0.95); }
        .ptz-speed { display:flex; align-items:center; gap:12px; justify-content:center; margin:16px 0; }
        .ptz-speed input[type=range] { width:200px; accent-color:#58a6ff; }
        .form-group { margin-bottom:16px; }
        .form-group label { display:block; font-size:14px; color:#8b949e; margin-bottom:6px; }
        .form-group input, .form-group select { width:100%; padding:10px 12px; background:#0d1117; border:1px solid #30363d; border-radius:6px; color:#e0e6f0; font-size:14px; }
        .form-group input:focus, .form-group select:focus { outline:none; border-color:#58a6ff; }
        .btn { padding:10px 20px; border:none; border-radius:6px; font-size:14px; cursor:pointer; transition:all 0.2s; }
        .btn-primary { background:#238636; color:#fff; }
        .btn-primary:hover { background:#2ea043; }
        .btn-secondary { background:#30363d; color:#e0e6f0; }
        .btn-secondary:hover { background:#484f58; }
        .btn-danger { background:#da3633; color:#fff; }
        .btn-danger:hover { background:#f85149; }
        .btn-warning { background:#d29922; color:#0d1117; }
        .btn-warning:hover { background:#e3b341; }
        .btn-sm { padding:6px 12px; font-size:12px; }
        .btn:disabled { opacity:0.5; cursor:not-allowed; }
        .btn-group { display:flex; gap:8px; flex-wrap:wrap; }
        .progress-bar { height:8px; background:#21262d; border-radius:4px; overflow:hidden; }
        .progress-fill { height:100%; border-radius:4px; transition:width 0.3s; }
        .progress-fill.green { background:#3fb950; }
        .progress-fill.yellow { background:#d29922; }
        .progress-fill.red { background:#f85149; }
        .progress-fill.blue { background:#58a6ff; }
        /* Advanced page status panel */
        .advanced-status-panel { background:#0d1117; border:1px solid #21262d; border-radius:10px; padding:16px; margin:16px 0; }
        .advanced-status-panel h4 { font-size:15px; color:#e0e6f0; margin-bottom:12px; border-bottom:1px solid #21262d; padding-bottom:8px; }
        .status-row { display:flex; justify-content:space-between; padding:6px 0; border-bottom:1px solid #21262d; font-size:14px; }
        .status-row:last-child { border-bottom:none; }
        .status-label { color:#8b949e; }
        .status-value { color:#e0e6f0; font-family:monospace; }
        .adv-header { display:flex; align-items:center; gap:12px; margin-bottom:20px; flex-wrap:wrap; }
        .adv-header select { max-width:300px; }
        .result-table { margin:16px 0; }
        .progress-section { margin:16px 0; }
        .progress-text { font-size:13px; color:#8b949e; margin-bottom:4px; }
        .current-direction { font-size:18px; color:#58a6ff; font-family:monospace; text-align:center; padding:8px; background:#0d1117; border-radius:8px; margin:12px 0; }
        .log-entry { padding:6px 12px; border-left:3px solid #30363d; margin-bottom:4px; font-size:13px; font-family:monospace; }
        .log-entry.info { border-color:#58a6ff; }
        .log-entry.warn { border-color:#d29922; }
        .log-entry.error { border-color:#f85149; }
        .log-entry.success { border-color:#3fb950; }
        /* Toast notification */
        .toast-container { position:fixed; top:60px; right:24px; z-index:9999; display:flex; flex-direction:column; gap:8px; }
        .toast { padding:12px 20px; border-radius:8px; font-size:14px; animation:slideIn 0.3s ease; min-width:250px; max-width:400px; }
        .toast.success { background:#1a4731; border:1px solid #3fb950; color:#3fb950; }
        .toast.error { background:#4d1c1a; border:1px solid #f85149; color:#f85149; }
        .toast.info { background:#1a3a52; border:1px solid #58a6ff; color:#58a6ff; }
        .toast.warning { background:#4a3a1a; border:1px solid #d29922; color:#d29922; }
        @keyframes slideIn { from { transform:translateX(100%); opacity:0; } to { transform:translateX(0); opacity:1; } }
        /* Modal */
        .modal-backdrop { position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.6); z-index:9000; display:flex; align-items:center; justify-content:center; }
        .modal { background:#161b22; border:1px solid #30363d; border-radius:12px; padding:24px; width:400px; max-width:90vw; }
        .modal h3 { margin-bottom:16px; font-size:18px; }
        .modal .btn-group { justify-content:flex-end; margin-top:20px; }
        /* Loading spinner */
        .spinner { display:inline-block; width:16px; height:16px; border:2px solid #30363d; border-top-color:#58a6ff; border-radius:50%; animation:spin 0.8s linear infinite; }
        @keyframes spin { to { transform:rotate(360deg); } }
        .loading { pointer-events:none; opacity:0.7; }
        /* Device actions */
        .actions { display:flex; gap:4px; flex-wrap:wrap; }
        /* PTZ status panel */
        .ptz-position { text-align:center; padding:12px; background:#0d1117; border-radius:8px; margin:12px 0; font-family:monospace; font-size:14px; }
        .toolbar { display:flex; justify-content:space-between; align-items:center; gap:12px; margin-bottom:16px; flex-wrap:wrap; }
        .toolbar-actions { display:flex; gap:8px; }
        .device-info-panel { background:#0d1117; border-radius:8px; padding:16px; margin-top:12px; font-size:13px; }
        .device-info-panel .info-row { display:flex; justify-content:space-between; padding:4px 0; border-bottom:1px solid #21262d; }
        .device-info-panel .info-row:last-child { border-bottom:none; }
        .device-info-panel .info-label { color:#8b949e; }
        .device-info-panel .info-value { color:#e0e6f0; font-family:monospace; }
        @media (max-width:768px) { .grid { grid-template-columns:1fr 1fr; } .header { flex-direction:column; gap:8px; } .nav { overflow-x:auto; } .console-layout { flex-direction:column !important; } .console-left, .console-right { width:100% !important; } }
        /* Console page: left-center-right layout (SPEC: left=PTZ 25%, center=video 50%, right=log 25%) */
        .console-layout { display:flex; gap:16px; align-items:flex-start; }
        .console-left { flex:0 0 25%; display:flex; flex-direction:column; min-width:280px; }
        .console-center { flex:1 1 50%; display:flex; flex-direction:column; min-width:400px; }
        .console-right { flex:0 0 25%; display:flex; flex-direction:column; min-width:200px; max-width:300px; }
    </style>
</head>
<body>
    <div class="header">
        <div class="logo">Astro<span>Hub</span></div>
        <div class="status-bar">
            <div class="status-item"><span class="status-dot green" id="wsDot"></span><span id="wsStatus">WebSocket</span></div>
            <div class="status-item" id="clock"></div>
            <span class="version">v5.19</span>
        </div>
    </div>
    <div class="nav">
        <button class="nav-btn active" data-page="dashboard">仪表盘</button>
        <button class="nav-btn" data-page="devices">设备管理</button>
        <button class="nav-btn" data-page="console">主控台</button>
        <button class="nav-btn" data-page="observation">观测计划</button>
        <!-- Advanced Features: 校准 功能测试 限位测试 速度测试 推流/存储 -->
        <button class="nav-btn" data-page="advanced">高级功能</button>
        <button class="nav-btn" data-page="replay">回放</button>
    </div>
    <div class="main">
        <!-- ==================== 仪表盘 ==================== -->

        <!-- ==================== Page Modules ==================== -->
        {% include "includes/dashboard.html" %}
        {% include "includes/devices.html" %}
        {% include "includes/console.html" %}
        {% include "includes/observation.html" %}
        {% include "includes/advanced.html" %}
        {% include "includes/replay.html" %}
    </div>
    <!-- Toast 容器 -->
    <div class="toast-container" id="toastContainer"></div>
    <!-- Modal 容器 -->
    <div id="modalContainer"></div>
    <script>
        console.log("[MAIN SCRIPT] Starting script execution");
        // WASM SDK global variables (before IIFE)
        var g_szDeviceIdentify = '';
        var g_bLoggedIn = false;
        var g_bPlaying = false;
        var g_iRtspPort = 554;
var g_szDeviceIdentify2 = "";
var g_bLoggedIn2 = false;
var g_bPlaying2 = false;
var g_iRtspPort2 = 554;
var g_iWndIndex2 = 0;
var g_iWebSocketPort = 7681;
        var g_iWndIndex = 0;
var g_iChannelList = [];
var g_iChannelID = 1;
        var g_iChannelID = 1;
// Global functions
    (function() {
        'use strict';
        // ================================================================
        //  Configuration
        // ================================================================
        var API_BASE = window.location.origin;
        var WS_URL = (window.location.protocol === 'https:' ? 'wss' : 'ws') + '://' + window.location.host + '/ws';
        // Cached device data
        var allDevices = [];
        var currentModal = null;
        // --- v3: Global connected device state ---
        // Advanced menu state (now sidebar)
        var advMenuActive = false;
        var advCurrentSub = 'calibration';
        // Onboarding wizard state
        var wizardState = {
            step: 0,
            totalSteps: 5,
            mac: '',
            deviceIP: '',
            runningTest: false,
            testResults: { function: null, limit: null, speed: null }
        };
        // ================================================================
        //  Initialization
        // ================================================================
        function init() {
            console.log('[INIT] init() called');
            updateClock();
            setInterval(updateClock, 1000);
            initNav();
            initPtzSpeed();
            initMouseUp();
            refreshDevices();
            addLog('info', 'AstroHub 已启动');
            connectWS();
        }
        // ================================================================
        //  Navigation
        // ================================================================
        function initNav() {
            document.querySelectorAll('.nav-btn[data-page]').forEach(function(btn) {
                btn.addEventListener('click', function() {
                    document.querySelectorAll('.nav-btn').forEach(function(b) { b.classList.remove('active'); });
                    document.querySelectorAll('.page').forEach(function(p) { p.classList.remove('active'); });
                    btn.classList.add('active');
                    document.getElementById('page-' + btn.getAttribute('data-page')).classList.add('active');
                    if (btn.getAttribute('data-page') === 'devices') refreshDevices();
                    if (btn.getAttribute('data-page') === 'console') {
                        refreshPtzDeviceList();
                        loadWasmDevices();
                        // Resize WASM player when console becomes visible
                        setTimeout(function() {
                            var container = document.getElementById('divPlugin');
                            if (container && window.WebVideoCtrl) {
                                try { WebVideoCtrl.I_Resize(container.offsetWidth, container.offsetHeight); console.log('[WASM] Resized to', container.offsetWidth, container.offsetHeight); } catch(e) { console.warn('Resize error:', e); }
                            }
                        }, 100);
                        // Check if device is online and trigger WASM login
                        if (!window.connectedDevice && allDevices && allDevices.length > 0) {
                            var onlineDev = allDevices.find(function(d) { return d.online; });
                            if (onlineDev) {
                                // Fetch credentials and set window.connectedDevice
                                apiGet('/api/v1/ptz/devices/' + onlineDev.ip + '/credentials').then(function(creds) {
                                    if (creds && creds.success) {
                                        window.connectedDevice = {
                                            ip: onlineDev.ip,
                                            model: onlineDev.model || '',
                                            name: onlineDev.name || onlineDev.device_name || '',
                                            mac: onlineDev.mac || '',
                                            username: creds.username || 'admin',
                                            password: creds.password || '',
                                            port: creds.port || 80,
                                            online: true
                                        };
                                        if (window.clickLogin2) { window.clickLogin2(); }
                                    }
                                }).catch(function(e) { console.warn('Failed to fetch credentials:', e); });
                            }
                        } else if (window.connectedDevice && window.clickLogin2) {
                            window.clickLogin2();
                        }
                    }
                    if (btn.getAttribute('data-page') === 'advanced') initAdvSidebar();
                    if (btn.getAttribute('data-page')) refreshAdvancedDeviceSelectors();
                });
            });
        }
        // Sidebar click handlers for advanced page sub-items
        function initAdvSidebar() {
            document.querySelectorAll('#advSidebar .sidebar-item').forEach(function(item) {
                item.onclick = function() {
                    var subPage = item.getAttribute('data-sub');
                    // Update sidebar active state
                    document.querySelectorAll('#advSidebar .sidebar-item').forEach(function(b) { b.classList.remove('active'); });
                    item.classList.add('active');
                    // Show sub-page
                    document.querySelectorAll('#advContent .page').forEach(function(p) { p.classList.remove('active'); });
                    var target = document.getElementById('page-' + subPage);
                    if (target) target.classList.add('active');
                    advCurrentSub = subPage;
                };
            });
        }
        // ================================================================
        //  Device Selectors for Advanced Pages
        // ================================================================
        function refreshAdvancedDeviceSelectors() {
            var online = (allDevices || []).filter(function(d) { return d.online; });
            var selectors = ['advFuncDevice', 'advLimitDevice', 'advSpeedDevice', 'calDevice', 'advStreamDevice'];
            selectors.forEach(function(id) {
                var sel = document.getElementById(id);
                if (!sel) return;
                var current = sel.value;
                // Rebuild options
                sel.innerHTML = '';
                if (id === 'calDevice' || id === 'advConnectDevice') {
                    var defaultOpt = document.createElement('option');
                    defaultOpt.textContent = '未选择设备';
                    defaultOpt.value = '';
                    sel.appendChild(defaultOpt);
                }
                online.forEach(function(d) {
                    var option = document.createElement('option');
                    option.value = d.ip;
                    option.textContent = ((d.model ? d.model + ' ' : '') + (d.name || d.device_name || d.ip)).trim() + ' (' + d.ip + ')';
                    sel.appendChild(option);
                });
                if (current) sel.value = current;
            });
        }
        // ================================================================
        //  API helpers
        // ================================================================
        async function apiGet(path) {
            var r = await fetch(API_BASE + path);
            if (!r.ok) throw new Error('HTTP ' + r.status);
            return r.json();
        }
        async function apiPost(path, body) {
            var opts = { method: 'POST', headers: {'Content-Type': 'application/json'} };
            if (body) opts.body = JSON.stringify(body);
            var r = await fetch(API_BASE + path, opts);
            if (!r.ok) throw new Error('HTTP ' + r.status);
            return r.json();
        }
        async function apiDelete(path) {
            var r = await fetch(API_BASE + path, { method: 'DELETE' });
            if (!r.ok) throw new Error('HTTP ' + r.status);
            return r.json();
        }
        // ================================================================
        //  Function Detection (P4.1-P4.21)
        // ================================================================
        function funcDetectRun() {
            if (!window.connectedDevice || !window.connectedDevice.ip) { showToast('warning', '请先在「设备管理」中连接设备'); return; }
            var deviceIp = window.connectedDevice.ip;
            var device = window.connectedDevice;
            var btn = document.getElementById('btnFuncRun');
            btn.disabled = true;
            btn.innerHTML = '<span class="spinner" style="display:inline-block"></span> 探测中...';
            document.getElementById('funcProgress').style.display = 'block';
            document.getElementById('funcResultArea').innerHTML = '';
            addLog('info', '功能探测开始: ' + deviceIp);
            apiPost('/api/v1/advanced/function/run', {
                device_ip: deviceIp,
                username: (device && device.username) || 'admin',
                password: (device && device.password) || '',
                port: (device && device.port) || 80
            }).then(function(resp) {
                btn.disabled = false;
                btn.innerHTML = '▶ 开始探测';
                document.getElementById('funcProgress').style.display = 'none';
                if (resp && resp.success) {
                    showToast('success', '功能探测完成');
                    addLog('success', '功能探测完成: ' + (resp.message || ''));
                    renderFuncResults(resp.results || {});
                } else {
                    showToast('error', resp ? resp.message : '探测失败');
                    addLog('error', '功能探测失败: ' + (resp ? resp.message : '未知'));
                }
            }).catch(function(e) {
                btn.disabled = false;
                btn.innerHTML = '▶ 开始探测';
                document.getElementById('funcProgress').style.display = 'none';
                showToast('error', '探测异常: ' + e.message);
            });
            // Simulate progress (REMOVED - hardcoded fake progress)
            // Progress bar now: 0% on start → "执行中..." → 100% on real API response
        }
        function funcDetectRestore() {
            if (!window.connectedDevice || !window.connectedDevice.ip) { showToast('warning', '请先在「设备管理」中连接设备'); return; }
            var deviceIp = window.connectedDevice.ip;
            var btn = document.getElementById('btnFuncRestore');
            btn.disabled = true;
            btn.innerHTML = '<span class="spinner" style="display:inline-block"></span> 恢复中...';
            apiPost('/api/v1/advanced/function/restore?device_ip=' + deviceIp + '&username=admin&password=&port=80', null).then(function(resp) {
                btn.disabled = false;
                btn.innerHTML = '⟳ 恢复默认值';
                if (resp && resp.success) {
                    showToast('success', '参数已恢复默认值');
                } else {
                    showToast('error', resp ? resp.message : '恢复失败');
                }
            }).catch(function(e) {
                btn.disabled = false;
                btn.innerHTML = '⟳ 恢复默认值';
                showToast('error', '恢复异常: ' + e.message);
            });
        }
        function renderFuncResults(results) {
            var area = document.getElementById('funcResultArea');
            var html = '<table class="result-table"><thead><tr><th>功能</th><th>支持</th><th>最小值</th><th>最大值</th><th>当前值</th><th>状态</th></tr></thead><tbody>';
            var keys = Object.keys(results);
            if (keys.length === 0) {
                html += '<tr><td colspan="6" style="text-align:center;color:#6e7681">暂无结果</td></tr>';
            } else {
                keys.forEach(function(key) {
                    var item = results[key];
                    var supported = item.supported ? '<span class="badge yes">✅</span>' : '<span class="badge no">❌</span>';
                    var status = item.status || '完成';
                    html += '<tr>';
                    html += '<td>' + key + '</td>';
                    html += '<td>' + supported + '</td>';
                    html += '<td>' + (item.min_value != null ? item.min_value : '--') + '</td>';
                    html += '<td>' + (item.max_value != null ? item.max_value : '--') + '</td>';
                    html += '<td>' + (item.current_value != null ? item.current_value : '--') + '</td>';
                    html += '<td><span class="badge yes">' + status + '</span></td>';
                    html += '</tr>';
                });
            }

        function simulateProgress(textId, barId, totalSteps, labels) {
            var current = 0;
            var interval = setInterval(function() {
                current++;
                if (current > totalSteps) { clearInterval(interval); return; }
                var pct = Math.round((current / totalSteps) * 100);
                var textEl = document.getElementById(textId);
                var barEl = document.getElementById(barId);
                if (textEl) textEl.textContent = labels ? labels[current-1] : '处理中... ' + current + '/' + totalSteps;
                if (barEl) barEl.style.width = pct + '%';
            }, 2000);
        }
        function simulateDirections() {
            var dirs = ['P+ 移动中...', 'P- 移动中...', 'T+ 移动中...', 'T- 移动中...'];
            var i = 0;
            var interval = setInterval(function() {
                var el = document.getElementById('limitDirection');
                if (!el) { clearInterval(interval); return; }
                if (i >= dirs.length) { clearInterval(interval); el.textContent = '测试完成 ✓'; el.style.color = '#3fb950'; return; }
                el.textContent = '当前方向: ' + dirs[i];
                i++;
            }, 3000);

        // 一键检测（全部）
        var detectionState = { running: false, step: 0, totalSteps: 3, results: {} };
        function startDetection() {
            var deviceIp = document.getElementById('advConnectDevice').value;
            if (!deviceIp) { showToast('warning', '请先选择设备'); return; }
            var device = allDevices.find(function(d) { return d.ip === deviceIp; });
            var btn = document.getElementById('btnStartDetection');
            btn.disabled = true;
            btn.innerHTML = '<span class="spinner" style="display:inline-block"></span> 检测中...';
            document.getElementById('detectionProgress').style.display = 'block';
            document.getElementById('detectionLog').innerHTML = '';
            detectionState = { running: true, step: 0, totalSteps: 3, results: {}, deviceIp: deviceIp, device: device };
            addDetectionLog('info', '开始一键检测: ' + deviceIp);
            runDetectionStep();
        }
        function runDetectionStep() {
            var state = detectionState;
            if (!state.running) return;
            var steps = [
                { name: '功能检测', url: '/api/v1/advanced/function/run', key: 'function' },
                { name: '限位检测', url: '/api/v1/advanced/limit/run', key: 'limit' },
                { name: '速度检测', url: '/api/v1/advanced/speed/run', key: 'speed' }
            ];
            if (state.step >= steps.length) {
                finishDetection();
                return;
            }
            var stepInfo = steps[state.step];
            var pct = Math.round(((state.step) / state.totalSteps) * 100);
            document.getElementById('detectionProgressText').textContent = '步骤 ' + (state.step + 1) + '/' + state.totalSteps + ': ' + stepInfo.name;
            document.getElementById('detectionProgressBar').style.width = pct + '%';
            addDetectionLog('info', '▶ 运行 ' + stepInfo.name + '...');
            apiPost(stepInfo.url, {
                device_ip: state.deviceIp,
                username: (state.device && state.device.username) || 'admin',
                password: (state.device && state.device.password) || '',
                port: (state.device && state.device.port) || 80
            }).then(function(resp) {
                if (resp && resp.success) {
                    state.results[stepInfo.key] = resp.results || {};
                    addDetectionLog('success', '✅ ' + stepInfo.name + ' 完成');
                } else {
                    addDetectionLog('error', '❌ ' + stepInfo.name + ' 失败: ' + (resp ? resp.message : '未知'));
                }
                state.step++;
                var newPct = Math.round((state.step / state.totalSteps) * 100);
                document.getElementById('detectionProgressBar').style.width = newPct + '%';
                runDetectionStep();
            }).catch(function(e) {
                addDetectionLog('error', '❌ ' + stepInfo.name + ' 异常: ' + e.message);
                state.step++;
                runDetectionStep();
            });
        }

var connectedDevice = null;
// WASM SDK global functions (simple version)
function setLoginStatus(msg, color) {
    var el = document.getElementById('login-status');
    if (el) {
        el.textContent = msg;
        if (color) el.style.color = color;
    }
    console.log('[WASM] Status: ' + msg);
}
function clickLogin2() {
    console.log('[CLICKLOGIN2] Called');
    if (typeof ptzLog === 'function') ptzLog('WASM SDK 登录开始...', 'debug');
    if (!window.connectedDevice || !window.connectedDevice.ip) {
        console.log('[WASM SDK] No device connected');
        if (typeof ptzLog === 'function') ptzLog('未连接设备，无法登录', 'warning');
        return;
    }
    console.log('[CLICKLOGIN2] Device IP: ' + window.connectedDevice.ip);
    if (typeof ptzLog === 'function') ptzLog('连接设备: ' + window.connectedDevice.ip, 'info');
    var szIP = window.connectedDevice.ip;
    var szPort = window.connectedDevice.port || 80;
    var szUsername = window.connectedDevice.username || 'admin';
    var szPassword = window.connectedDevice.password || '';
    g_szDeviceIdentify2 = szIP + '_' + szPort;
    console.log('[WASM SDK] Login: ' + szIP + ':' + szPort);
    WebVideoCtrl.I_Login(szIP, 1, szPort, szUsername, szPassword, {
        timeout: 5000,
        success: function(xmlDoc) {
            g_bLoggedIn2 = true;
            console.log('[WASM SDK] Login success: ' + g_szDeviceIdentify2);
            if (typeof ptzLog === 'function') ptzLog('✅ 登录成功', 'success');
            // Step 2.1: I_GetDevicePort - get WebSocket port
            var oPort = WebVideoCtrl.I_GetDevicePort(g_szDeviceIdentify2);
            console.log('[WASM SDK] GetDevicePort result:', oPort);
            if (oPort) {
                g_iRtspPort2 = oPort.iRtspPort || 554;
                g_iWebSocketPort = oPort.iWebSocketPort || 7681; // WebSocket port for video
                if (typeof ptzLog === 'function') ptzLog('WebSocket端口: ' + g_iWebSocketPort + ', RTSP端口: ' + g_iRtspPort2, 'info');
                console.log('[WASM SDK] WebSocket port:', g_iWebSocketPort, 'RTSP port:', g_iRtspPort2);
                // Set WebSocket proxy cookies (required by SDK for video streaming)
                document.cookie = 'webVideoCtrlProxyWs=' + szIP + ':' + g_iWebSocketPort + '; path=/';
                document.cookie = 'webVideoCtrlProxyWsChannel=101; path=/';
                console.log('[WASM SDK] Set cookies: webVideoCtrlProxyWs=' + szIP + ':' + g_iWebSocketPort);
            }
            // Step 2.2: I_GetAnalogChannelInfo - get channel list
            WebVideoCtrl.I_GetAnalogChannelInfo(g_szDeviceIdentify2, {
                success: function(xmlDocChannels) {
                    var channels = [];
                    var nodeList = xmlDocChannels.getElementsByTagName('VideoInputChannel');
                    for (var i = 0; i < nodeList.length; i++) {
                        var id = nodeList[i].getElementsByTagName('id')[0]?.textContent || (i + 1);
                        var name = nodeList[i].getElementsByTagName('name')[0]?.textContent || ('通道' + id);
                        channels.push({ id: parseInt(id), name: name });
                    }
                    g_iChannelList = channels;
                    g_iChannelID = channels.length > 0 ? channels[0].id : 1;
                    console.log('[WASM SDK] Channels:', channels, 'Using channelID:', g_iChannelID);
                    if (typeof ptzLog === 'function') ptzLog('获取通道: ' + channels.length + '个, 使用ID: ' + g_iChannelID, 'info');
                    // Update WebSocket channel cookie
                    document.cookie = 'webVideoCtrlProxyWsChannel=' + g_iChannelID + '01; path=/';
                    // Step 2.3: Start stream after channel info loaded
                    console.log('[WASM SDK] Calling startConsoleStream2 in 500ms...');
                    setTimeout(function() {
                        console.log('[WASM SDK] setTimeout fired, startConsoleStream2 exists:', typeof window.startConsoleStream2);
                        if (window.startConsoleStream2) {
                            window.startConsoleStream2('sub');
                        } else {
                            console.error('[WASM SDK] startConsoleStream2 not found!');
                            if (typeof ptzLog === 'function') ptzLog('startConsoleStream2 未定义', 'error');
                        }
                    }, 500);
                },
                error: function(status, xmlDocErr) {
                    console.warn('[WASM SDK] GetAnalogChannelInfo failed:', status);
                    if (typeof ptzLog === 'function') ptzLog('获取通道失败，使用默认ID: 1', 'warning');
                    g_iChannelID = 1;
                    // Still try to start stream
                    setTimeout(function() {
                        if (window.startConsoleStream2) window.startConsoleStream2('sub');
                    }, 500);
                }
            });
        },
        error: function(status, xmlDoc) {
            console.error('[WASM SDK] Login failed:', status);
            g_bLoggedIn2 = false;
            if (typeof ptzLog === 'function') ptzLog('❌ 登录失败: ' + status, 'error');
        }
    });
}
window.clickLogin2 = clickLogin2; // Manually expose to window
function startConsoleStream2(mode) {
    console.log("[STARTSTREAM2] Called, g_bLoggedIn2=", g_bLoggedIn2);
    if (typeof ptzLog === 'function') ptzLog('正在启动视频流...', 'info');
    if (!window.connectedDevice || !window.connectedDevice.ip) { console.log("[STARTSTREAM2] No device"); if (typeof ptzLog === 'function') ptzLog('未连接设备', 'warning'); return; }
    if (!g_bLoggedIn2) { if (window.clickLogin2) window.clickLogin2(); return; }
    var iStreamType = (mode === 'main') ? 1 : 2;
    var iChannelID = g_iChannelID || 1; // Use channel ID from I_GetAnalogChannelInfo
    console.log('[WASM SDK] Stream type:', iStreamType, 'Channel ID:', iChannelID);
    if (typeof ptzLog === 'function') ptzLog('码流类型: ' + (iStreamType === 1 ? '主码流' : '子码流') + ', 通道ID: ' + iChannelID, 'info');
    var oWndInfo = WebVideoCtrl.I_GetWindowStatus(g_iWndIndex2);
    var doStart = function() {
        console.log('[WASM SDK] Starting real play, stream=' + iStreamType + ', channel=' + iChannelID);
        WebVideoCtrl.I_StartRealPlay(g_szDeviceIdentify2, {
              // iRtspPort not needed for WebSocket proxy mode
            iStreamType: iStreamType,
            iChannelID: iChannelID,
            bZeroChannel: false,
            success: function() {
                g_bPlaying2 = true;
                console.log('[WASM SDK] Real play started');
                if (typeof ptzLog === 'function') ptzLog('✅ 视频播放中', 'success');
            },
            error: function(status, xmlDoc) {
                console.error('[WASM SDK] StartRealPlay error:', status);
                  if (typeof ptzLog === 'function') ptzLog('视频播放错误: ' + status, 'error');
            }
        });
    };
    if (oWndInfo != null) {
        WebVideoCtrl.I_Stop({ success: function() { doStart(); }, error: function() { doStart(); } });
    } else {
        doStart();
    }
}
window.startConsoleStream2 = startConsoleStream2; // Manually expose
        function stopConsoleStream2() {
    // Always clear video area
      // if (!g_bPlaying2) return;  // Commented out to always clear
    var oWndInfo = WebVideoCtrl.I_GetWindowStatus(g_iWndIndex2);
    if (oWndInfo != null) {
        WebVideoCtrl.I_Stop();
            g_bPlaying2 = false;
            var videoDiv = document.getElementById('divPlugin');
            if (videoDiv) videoDiv.innerHTML = '';
            console.log('[WASM SDK] Stopped and cleared');
    }
}

</script>
