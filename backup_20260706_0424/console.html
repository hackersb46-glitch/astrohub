// 连接设备时加载图像参数(从function.json读取范围,从ISAPI读取当前值)
// v6.20: 优先读取缓存,无缓存时禁用控件
// v6.41: 修复下拉菜单加载中问题
// 当 function.json 不存在时,仍然加载基础参数(使用默认范围)
// v6.43: 刷新画面控制按钮
function refreshImageControls() {
    if (!window.connectedDevice || !window.connectedDevice.ip) {
        console.warn('[IMAGE] No device connected');
        return;
    }
    console.log('[IMAGE] Refreshing image controls...');
    loadDeviceImageParams(window.connectedDevice.ip);
}

// v6.50: 重置画面控制到系统默认值
function resetImageControls() {
    if (!window.connectedDevice || !window.connectedDevice.ip) {
        console.warn('[IMAGE] No device connected');
        return;
    }

    // v7.117: 使用统一弹窗确认
    showModal({
        type: 'confirm',
        title: '重置',
        message: '确认重置画面控制到系统默认值?',
        onConfirm: function() {
            var dev = window.connectedDevice.ip;
            console.log('[IMAGE] Resetting image controls to defaults...');

            // 系统默认值
            var defaults = {
                brightness: 50,
                contrast: 50,
                saturation: 50,
                sharpness: 50,
                wbRed: 100,
                wbBlue: 100,
                dnrSpatial: 50,
                dnrTemporal: 50,
                exposureMode: 'auto',
                shutterSpeed: '1/100',
                irisLevel: 1600
            };

            // 更新 UI
            document.getElementById('consoleBrightness').value = defaults.brightness;
            document.getElementById('brightnessVal').textContent = defaults.brightness;
            document.getElementById('consoleContrast').value = defaults.contrast;
            document.getElementById('contrastVal').textContent = defaults.contrast;
            document.getElementById('consoleSaturation').value = defaults.saturation;
            document.getElementById('saturationVal').textContent = defaults.saturation;
            document.getElementById('consoleSharpness').value = defaults.sharpness;
            document.getElementById('sharpnessVal').textContent = defaults.sharpness;
            document.getElementById('wbRed').value = defaults.wbRed;
            document.getElementById('wbRedVal').textContent = defaults.wbRed;
            document.getElementById('wbBlue').value = defaults.wbBlue;
            document.getElementById('wbBlueVal').textContent = defaults.wbBlue;
            document.getElementById('dnrSpatial').value = defaults.dnrSpatial;
            document.getElementById('dnrSpatialVal').textContent = defaults.dnrSpatial;
            document.getElementById('dnrTemporal').value = defaults.dnrTemporal;
            document.getElementById('dnrTemporalVal').textContent = defaults.dnrTemporal;
            document.getElementById('exposureMode').value = defaults.exposureMode;
            document.getElementById('shutterSpeed').value = defaults.shutterSpeed;
            document.getElementById('irisLevel').value = defaults.irisLevel;

            // 发送 API 请求重置设备
            apiPost('/api/v1/ptz/' + dev + '/image/reset', {})
                .then(function(r) {
                    if (r && r.success) {
                        showToast('success', '画面控制已重置到系统默认值');
                        if (typeof operationLog === 'function') operationLog('画面重置', 'success');
                    } else {
                        showToast('error', '重置失败: ' + (r.message || '未知错误'));
                    }
                })
                .catch(function(e) {
                    showToast('error', '重置请求失败');
                });
        }
    });
}

function loadDeviceImageParams(deviceIp) {
    if (!deviceIp) return;

    if (typeof apiGet === 'undefined') {
        console.error('[IMAGE] apiGet not defined');
        return;
    }

    console.log('[IMAGE] Loading image params for:', deviceIp);

    // v6.41: 重置状态
    functionCacheLoaded = false;
    deviceFunctionData = null;

    // v7.32: 必须有 function.json 才能启用画面控制
    apiGet('/api/v1/ptz/' + deviceIp + '/function').then(function(r) {
        if (r && r.success && r.data && r.data.functions) {
            deviceFunctionData = r.data;
            functionCacheLoaded = true;
            console.log('[IMAGE] function.json loaded, detected_at:', r.data.detected_at);
            enableImageControls();
            // 移除覆盖层
            removeFunctionOverlay();
            // 加载图像参数
            loadAllImageParams(deviceIp);
        } else {
            console.warn('[IMAGE] function.json not found - disabling image controls');
            // 禁用画面控制
            disableImageControls('请执行功能检测,以启用此功能');
            // 显示覆盖层
            showFunctionOverlay();
        }
    }).catch(function(e) {
        console.warn('[IMAGE] function.json failed:', e);
        disableImageControls('请执行功能检测,以启用此功能');
        showFunctionOverlay();
    });
}

// v7.32: 加载所有图像参数
function loadAllImageParams(deviceIp) {
    _isInitializingImageParams = true;  // v7.59: 开始初始化,禁止记录日志
    loadExposure(deviceIp);
    loadOsdStatus(deviceIp);
    loadWhiteBalance(deviceIp);
    loadNoiseReduce(deviceIp);
    loadFilterStatus(deviceIp);
    loadSlowShutter(deviceIp);
    loadShutter(deviceIp);
    loadIris(deviceIp);
    loadSharpness(deviceIp);
    loadColorParams(deviceIp);
    loadGain(deviceIp);
    // v8.46: 延迟恢复保存的设置
    setTimeout(function() { restoreSettings(deviceIp); }, 500);
    // v7.59: 延迟结束初始化标志(等待异步加载完成)
    setTimeout(function() { _isInitializingImageParams = false; }, 3000);
}

// v8.46: 恢复设备参数记忆
function restoreSettings(deviceIp) {
    apiGet('/api/v1/ptz/' + deviceIp + '/image/settings-saved').then(function(r) {
        if (r && r.success && r.data && Object.keys(r.data).length > 0) {
            var s = r.data;
            // 恢复曝光模式
            if (s.exposure && s.exposure.mode) {
                var exposureSelect = document.getElementById('exposureMode');
                if (exposureSelect) {
                    exposureSelect.value = s.exposure.mode;
                    setExposureMode(s.exposure.mode);
                    updateShutterIrisState();
                }
            }
            // 恢复快门
            if (s.shutter && s.shutter.level) {
                var shutterSelect = document.getElementById('shutterSpeed');
                if (shutterSelect) {
                    shutterSelect.value = s.shutter.level;
                    setShutterSpeed(s.shutter.level);
                }
            }
            // 恢复光圈
            if (s.iris && s.iris.level) {
                var irisSelect = document.getElementById('irisLevel');
                if (irisSelect) {
                    irisSelect.value = s.iris.level;
                    setIris(s.iris.level);
                }
            }
            // 恢复白平衡
            if (s.whitebalance) {
                if (s.whitebalance.mode) {
                    var wbSelect = document.getElementById('wbMode');
                    if (wbSelect) {
                        wbSelect.value = s.whitebalance.mode;
                        setWhiteBalanceMode(s.whitebalance.mode);
                    }
                }
            }
            // 恢复慢快门
            if (s.slow_shutter && s.slow_shutter.dss_level) {
                var ssSelect = document.getElementById('slowShutterSelect');
                if (ssSelect) {
                    ssSelect.value = s.slow_shutter.dss_level;
                    onSlowShutterChange(s.slow_shutter.dss_level);
                }
            }
        }
    }).catch(function(e) {
        console.warn('[RESTORE] 恢复设置失败:', e);
    });
}

// v7.32: 显示功能检测覆盖层
function showFunctionOverlay() {
    var section = document.getElementById('imageControlSection');
    if (!section) return;

    // 移除旧覆盖层
    var oldOverlay = document.getElementById('function-required-overlay');
    if (oldOverlay) oldOverlay.remove();

    // 创建覆盖层

// v8.40: 定时触发执行（使用保存的选区）
function executeScheduledSearch(mode) {
    var regionStr = localStorage.getItem('region_' + mode);
    if (!regionStr) {
        showToast('warning', (mode === 'whitebalance' ? '白平衡' : '对焦') + '无保存选区');
        return;
    }
    var dev = window.connectedDevice;
    if (!dev || !dev.ip) { showToast('error', '未连接设备'); return; }
    var region = JSON.parse(regionStr);
    var endpoint = mode === 'whitebalance' ? '/api/v1/vision/whitebalance-search' : '/api/v1/vision/focus-search';
    var label = mode === 'whitebalance' ? '白平衡' : '对焦';
    showToast('info', label + '定时执行中...');
    operationLog('── ' + label + '定时执行 ──', 'info');
    var body = JSON.stringify({ x: region.x, y: region.y, w: region.w, h: region.h });
    fetch(endpoint, { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: body })
        .then(function(resp) {
            if (!resp.ok) throw new Error('HTTP ' + resp.status);
            var reader = resp.body.getReader();
            var decoder = new TextDecoder();
            var buf = '';
            function pump() {
                return reader.read().then(function(r) {
                    if (r.done) return;
                    buf += decoder.decode(r.value, { stream: true });
                    var parts = buf.split('\n\n');
                    buf = parts.pop();
                    for (var i = 0; i < parts.length; i++) {
                        var line = parts[i];
                        if (!line.startsWith('data: ')) continue;
                        try {
                            var ev = JSON.parse(line.slice(6));
                            if (ev.type === 'wb' || ev.type === 'focus') {
                                operationLog('调整 #' + ev.step + ': ' + ev.stage + ' R=' + ev.red_gain + ' B=' + ev.blue_gain + ' Δ=' + ev.delta, 'info');
                            } else if (ev.type === 'done') {
                                operationLog('── ' + label + '完成: R=' + ev.final_red + ' B=' + ev.final_blue + ' (' + ev.total_steps + '步) ──', 'success');
                            } else if (ev.type === 'error') {
                                operationLog(label + '错误: ' + ev.message, 'error');
                            }
                        } catch (e) {}
                    }
                    return pump();
                });
            }
            return pump();
        })
        .then(function() {
            // 执行完成后，重新启动定时器
            if (mode === 'whitebalance' && wbTimerId === null) {
                var minutes = parseInt(document.getElementById('wbTimerInput').value) || 0;
                if (minutes > 0) {
                    wbTimerSeconds = minutes * 60;
                    updateWbTimerDisplay();
                    wbTimerId = setInterval(function() {
                        wbTimerSeconds--;
                        updateWbTimerDisplay();
                        if (wbTimerSeconds <= 0) {
                            clearInterval(wbTimerId);
                            wbTimerId = null;
                            executeScheduledSearch('whitebalance');
                        }
                    }, 1000);
                }
            }
            if (mode === 'focus' && focusTimerId === null) {
                var minutes = parseInt(document.getElementById('focusTimerInput').value) || 0;
                if (minutes > 0) {
                    focusTimerSeconds = minutes * 60;
                    updateFocusTimerDisplay();
                    focusTimerId = setInterval(function() {
                        focusTimerSeconds--;
                        updateFocusTimerDisplay();
                        if (focusTimerSeconds <= 0) {
                            clearInterval(focusTimerId);
                            focusTimerId = null;
                            executeScheduledSearch('focus');
                        }
                    }, 1000);
                }
            }
        })
        .catch(function(e) {
            showToast('error', label + '定时执行失败: ' + e.message);
        });
}

// 设置降噪
function setNoiseReduce(type, value) {
    var dev = window.connectedDevice ? window.connectedDevice.ip : null;
    if (!dev) return;

    var el = document.getElementById(type === 'spatial' ? 'dnrSpatialVal' : 'dnrTemporalVal');
    if (el) el.textContent = value;

    var key = type === 'spatial' ? 'spatial_level' : 'temporal_level';
    var label = type === 'spatial' ? '空域降噪' : '时域降噪';

    apiPost('/api/v1/ptz/' + dev + '/image/noisereduce', { [key]: parseInt(value) })
        .then(function(r) {
            if (r && r.success) {
                showToast('success', label + ': ' + value);
                if (typeof operationLog === 'function' && !_isInitializingImageParams) operationLog(label + ': ' + value, 'success');
            }
        });
}

// v8.44: 慢快门
function loadSlowShutter(deviceIp) {
    var sel = document.getElementById('slowShutterSelect');
    if (!sel) return;
    
    // v8.45: 从function.json读取DSS支持倍率
    if (!deviceFunctionData || !deviceFunctionData.functions || !deviceFunctionData.functions.slow_shutter) {
        sel.disabled = true;
        sel.innerHTML = '<option value="">设备不支持</option>';
        return;
    }
    
    var dss = deviceFunctionData.functions.slow_shutter;
    if (!dss.supported) {
        sel.disabled = true;
        sel.innerHTML = '<option value="">设备不支持</option>';
        return;
    }
    
    sel.disabled = false;
    sel.innerHTML = '';
    
    // 添加"关闭"选项
    var offOpt = document.createElement('option');
    offOpt.value = 'off';
    offOpt.textContent = '关闭';
    sel.appendChild(offOpt);
    
    // 从opt_values添加倍率选项
    if (dss.opt_values && Array.isArray(dss.opt_values)) {
        dss.opt_values.forEach(function(level) {
            var opt = document.createElement('option');
            opt.value = level;
            opt.textContent = level;
            sel.appendChild(opt);
        });
    }
    
    // 获取当前DSS状态并设置选中项
    apiGet('/api/v1/ptz/' + deviceIp + '/image/slow-shutter').then(function(r) {
        if (r && r.success && r.data) {
            if (r.data.enabled && r.data.dss_level) {
                sel.value = r.data.dss_level;
            } else {
                sel.value = 'off';
            }
        }
    });
}

function setSlowShutter(val) {
    var dev = window.connectedDevice ? window.connectedDevice.ip : null;
    if (!dev) return;
    apiPut('/api/v1/ptz/' + dev + '/image/slow-shutter', { dss_level: val }).then(function(r) {
        if (r && r.success) {
            showToast('success', r.message);
            if (typeof operationLog === 'function') operationLog('慢快门: ' + r.message, 'success');
            // 更新下拉菜单的值
            var sel = document.getElementById('slowShutterSelect');
            if (sel) sel.value = val;
        }
    });
}
// v8.43: 三段式开关 - 更新高亮
function updateSwitchHighlight(switchId, selectedValue) {
    var switchEl = document.getElementById(switchId);
    if (!switchEl) return;
    var buttons = switchEl.querySelectorAll('.ts-btn');
    buttons.forEach(function(btn) {
        if (btn.dataset.value === selectedValue) {
            btn.classList.add('active');
        } else {
            btn.classList.remove('active');
        }
    });
}

// 加载曝光模式
function loadExposure(deviceIp) {
    // v7.54: 从 function.json 加载曝光模式选项
    if (!deviceFunctionData || !deviceFunctionData.functions || !deviceFunctionData.functions.exposure_mode) {
        console.warn('[Exposure] No function.json data available');
        return;
    }

    var exposureValues = deviceFunctionData.functions.exposure_mode.opt_values;
    if (!exposureValues || !Array.isArray(exposureValues) || exposureValues.length === 0) {
        console.warn('[Exposure] exposure_mode not supported');
        var select = document.getElementById('exposureMode');
        if (select) {
            select.innerHTML = '<option value="">-- 不支持 --</option>';
            select.disabled = true;
        }
        return;
    }

    // 填充选项
    var select = document.getElementById('exposureMode');
    if (select) {
        select.innerHTML = '';
        select.disabled = false;

        exposureValues.forEach(function(p) {
            var opt = document.createElement('option');
            opt.value = p;
            // 中文标签
            var labelMap = {
                'manual': '手动',
                'auto': '自动',
                'IrisFirst': '光圈优先',
                'ShutterFirst': '快门优先'
            };
            opt.textContent = labelMap[p] || p;
            select.appendChild(opt);
        });
    }

    // 获取当前值
    apiGet('/api/v1/ptz/' + deviceIp + '/image/exposure').then(function(r) {
        if (r && r.success && r.data) {
            if (select && r.data.mode) {
                select.value = r.data.mode;
                // 更新快门光圈禁用状态
                updateShutterIrisState();
            }
        }
    }).catch(function(e) {
        console.warn('[Exposure] Load failed:', e);
    });
}

// 设置曝光模式
function setExposureMode(mode) {
    var dev = window.connectedDevice ? window.connectedDevice.ip : null;
    if (!dev) return;
    // v7.54: 支持多种曝光模式的中文显示
    var labelMap = {
        'manual': '手动',
        'auto': '自动',
        'IrisFirst': '光圈优先',
        'ShutterFirst': '快门优先'
    };
    apiPost('/api/v1/ptz/' + dev + '/image/exposure', { mode: mode })
        .then(function(r) {
            if (r && r.success) {
                showToast('success', '曝光模式: ' + (labelMap[mode] || mode));
                if (typeof operationLog === 'function' && !_isInitializingImageParams) operationLog('曝光: ' + (labelMap[mode] || mode), 'success');
            }
        });
    // v5.47: 更新快门光圈禁用状态
    updateShutterIrisState();
}

// v5.47: 更新快门光圈禁用状态
function updateShutterIrisState() {
    // v7.30: 检查设备是否连接
    if (!window.connectedDevice || !window.connectedDevice.ip) {
        // 设备未连接,所有控件保持禁用
        return;
    }

    var exposureMode = document.getElementById('exposureMode');
    var shutterSelect = document.getElementById('shutterSpeed');
    var irisSelect = document.getElementById('irisLevel');
    var gainSlider = document.getElementById('gainLevel');
    if (!exposureMode || !shutterSelect || !irisSelect) return;

    // v7.54: 支持多种曝光模式
    var mode = exposureMode.value;
    var shutterEnabled = (mode === 'manual' || mode === 'ShutterFirst');
    var irisEnabled = (mode === 'manual' || mode === 'IrisFirst');
    var gainEnabled = (mode === 'manual' || mode === 'ShutterFirst' || mode === 'IrisFirst');
    shutterSelect.disabled = !shutterEnabled;
    irisSelect.disabled = !irisEnabled;
    if (gainSlider) gainSlider.disabled = !gainEnabled;

    // v8.40: 自动模式时隐藏快门/光圈/增益
    var shutterRow = shutterSelect.parentElement.parentElement;
    var gainRow = gainSlider ? gainSlider.parentElement : null;
    if (mode === 'auto') {
        shutterRow.style.display = 'none';
        if (gainRow) gainRow.style.display = 'none';
    } else {
        shutterRow.style.display = '';
        if (gainRow) gainRow.style.display = '';
        shutterSelect.style.opacity = shutterEnabled ? '1' : '0.5';
        irisSelect.style.opacity = irisEnabled ? '1' : '0.5';
        if (gainSlider) gainSlider.style.opacity = gainEnabled ? '1' : '0.5';
    }
}

// v7.03: 加载增益
function loadGain(deviceIp) {
    apiGet('/api/v1/ptz/' + deviceIp + '/image/gain').then(function(r) {
        if (r && r.success && r.data) {
            var g = r.data;
            deviceImageParams.gain = g;

            var slider = document.getElementById('gainLevel');
            var valEl = document.getElementById('gainVal');

            if (slider) {
                slider.min = 0;
                slider.max = g.limit || 100;
                slider.value = g.current_level || 0;
            }
            if (valEl) valEl.textContent = g.current_level || 0;
        }
    }).catch(function(e) {
        console.warn('[Gain] Load failed:', e);
    });

// ==================== v7.0: PTZ 坐标 + 图像参数实时刷新 ====================
var _ptzImagePollInterval = null;

function startPtzImagePoll() {
    if (_ptzImagePollInterval) return; // 已在运行

    _ptzImagePollInterval = setInterval(function() {
        if (!window.connectedDevice || !window.connectedDevice.ip) return;

        var dev = window.connectedDevice.ip;

        // 1. PTZ 坐标 - v7.55: 分别更新三个元素
        apiGet('/api/v1/ptz/' + dev + '/position').then(function(r) {
            if (r && r.success && r.data) {
                var panEl = document.getElementById('ptzPan');
                var tiltEl = document.getElementById('ptzTilt');
                var zoomEl = document.getElementById('ptzZoom');
                if (panEl) panEl.textContent = r.data.pan || 0;
                if (tiltEl) tiltEl.textContent = r.data.tilt || 0;
                if (zoomEl) zoomEl.textContent = r.data.zoom || 0;
            }
        }).catch(function(e) {});

        // 2. 白平衡 R/B - v7.55: 只显示数值
        apiGet('/api/v1/ptz/' + dev + '/image/whitebalance').then(function(r) {
            if (r && r.success && r.data) {
                var wb = r.data;
                var rEl = document.getElementById('ptzWbR');
                var bEl = document.getElementById('ptzWbB');
                if (rEl) rEl.textContent = wb.red_gain || '--';
                if (bEl) bEl.textContent = wb.blue_gain || '--';
            }
        }).catch(function(e) {});

        // 3. 降噪空域/时域 - v7.55: 只显示数值
        apiGet('/api/v1/ptz/' + dev + '/image/noisereduce').then(function(r) {
            if (r && r.success && r.data) {
                var nr = r.data;
                var sEl = document.getElementById('ptzDnrSpatial');
                var tEl = document.getElementById('ptzDnrTemporal');
                var spatialVal = (nr.spatial_level !== undefined && nr.spatial_level !== null) ? nr.spatial_level : '--';
                var temporalVal = (nr.temporal_level !== undefined && nr.temporal_level !== null) ? nr.temporal_level : '--';
                if (sEl) sEl.textContent = spatialVal;
                if (tEl) tEl.textContent = temporalVal;
            }
        }).catch(function(e) {});

        // 4. 光圈 - v7.55: 只显示数值
        apiGet('/api/v1/ptz/' + dev + '/image/iris').then(function(r) {
            if (r && r.success && r.data) {
                var ir = r.data;
                var iEl = document.getElementById('ptzIris');
                if (iEl) iEl.textContent = ir.current_level || '--';
            }
        }).catch(function(e) {});

        // 5. 快门 - v7.55: 只显示数值
        apiGet('/api/v1/ptz/' + dev + '/image/shutter').then(function(r) {
            if (r && r.success && r.data) {
                var sh = r.data;
                var sEl = document.getElementById('ptzShutter');
                if (sEl) sEl.textContent = sh.current_level || '--';
            }
        }).catch(function(e) {});
    }, 1000);
}

function stopPtzImagePoll() {
    if (_ptzImagePollInterval) {
        clearInterval(_ptzImagePollInterval);
        _ptzImagePollInterval = null;
    }
}
